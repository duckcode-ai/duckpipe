<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuckPipe — Incident Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            brand: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',800:'#065f46',900:'#064e3b',950:'#022c22' },
            surface: { 0:'#020617', 1:'#0f172a', 2:'#1e293b', 3:'#334155' },
          },
        },
      },
    };
  </script>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
      "lucide-react": "https://esm.sh/lucide-react@0.462.0?external=react",
      "marked": "https://esm.sh/marked@15.0.4"
    }
  }
  </script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #334155 #0f172a; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #020617; }
    .fade-in { animation: fadeIn .35s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
    .drawer-enter { animation: slideIn .3s cubic-bezier(.16,1,.3,1) forwards; }
    .drawer-exit  { animation: slideOut .25s ease-in forwards; }
    .md-content h1 { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; margin: 1rem 0 .5rem; }
    .md-content h2 { font-size: .95rem; font-weight: 600; color: #e2e8f0; margin: .85rem 0 .4rem; }
    .md-content h3 { font-size: .85rem; font-weight: 600; color: #cbd5e1; margin: .6rem 0 .3rem; }
    .md-content p  { margin: .35rem 0; line-height: 1.75; }
    .md-content ul, .md-content ol { margin: .35rem 0; padding-left: 1.25rem; }
    .md-content li { margin: .2rem 0; line-height: 1.65; }
    .md-content strong { color: #f1f5f9; }
    .md-content em { color: #94a3b8; }
    .md-content code { background: rgba(30,41,59,.8); padding: .12rem .4rem; border-radius: .25rem; font-size: .72rem; color: #67e8f9; }
    .md-content pre { background: #0f172a; border: 1px solid rgba(51,65,85,.5); border-radius: .5rem; padding: .75rem; overflow-x: auto; margin: .5rem 0; }
    .md-content pre code { background: none; padding: 0; }
    .md-content hr { border: none; border-top: 1px solid rgba(51,65,85,.4); margin: .75rem 0; }
    .md-content a { color: #38bdf8; text-decoration: underline; }
    .detail-toggle { cursor: pointer; user-select: none; }
    .detail-toggle:hover { color: #e2e8f0; }
    .glass { background: rgba(15,23,42,.65); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }
    .sev-glow-P1 { box-shadow: 0 0 80px -20px rgba(239,68,68,.18), inset 0 1px 0 rgba(239,68,68,.1); }
    .sev-glow-P2 { box-shadow: 0 0 80px -20px rgba(245,158,11,.14), inset 0 1px 0 rgba(245,158,11,.08); }
    .sev-glow-P3 { box-shadow: 0 0 80px -20px rgba(99,102,241,.14), inset 0 1px 0 rgba(99,102,241,.08); }
    .timeline-dot { position: relative; padding-left: 2rem; }
    .timeline-dot::before { content: ''; position: absolute; left: .45rem; top: .55rem; width: 8px; height: 8px; border-radius: 50%; background: #6366f1; border: 2px solid #0f172a; z-index: 1; }
    .timeline-dot::after { content: ''; position: absolute; left: .7rem; top: 1.4rem; bottom: -1rem; width: 1px; background: linear-gradient(to bottom, rgba(99,102,241,.35), transparent); }
    .timeline-dot:last-child::after { display: none; }
  </style>
</head>
<body class="bg-surface-0 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect, useCallback, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      AreaChart, Area, BarChart, Bar, LineChart, Line, PieChart, Pie, Cell,
      XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend
    } from 'recharts';
    import {
      Activity, AlertTriangle, BarChart3, CheckCircle2, ChevronDown, ChevronRight, Clock,
      CreditCard, Database, Download, ExternalLink, FileText, Filter, Home,
      Layers, Moon, RefreshCw, Search, Server, Settings, Shield, Sun,
      Terminal, XCircle, Zap, TrendingUp, Eye, GitBranch, MessageSquare,
      X, Send, BookOpen, Radio, Users, Cpu, ArrowRight, Sparkles, Target, List
    } from 'lucide-react';
    import { marked } from 'marked';

    marked.setOptions({ breaks: true, gfm: true });
    const h = React.createElement;

    function renderMarkdown(text) {
      if (!text) return '';
      try { return marked.parse(text); } catch { return text; }
    }
    function MarkdownContent({ content, className = '' }) {
      const html = useMemo(() => renderMarkdown(content), [content]);
      return h('div', { className: `md-content text-sm text-slate-300 leading-relaxed ${className}`, dangerouslySetInnerHTML: { __html: html } });
    }

    const POLL = 30000;
    const TOKEN = localStorage.getItem('duckpipe_token') || '';
    function authHeaders() { const h = {}; if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN; return h; }
    async function api(path) {
      const res = await fetch('/api/' + path, { headers: authHeaders() });
      if (res.status === 401) { localStorage.removeItem('duckpipe_token'); window.location.hash = '#/setup'; throw new Error('Unauthorized'); }
      if (!res.ok) throw new Error(`API ${res.status}`);
      return res.json();
    }
    async function apiPost(path, body) {
      const res = await fetch('/api/' + path, { method: 'POST', headers: { 'Content-Type': 'application/json', ...authHeaders() }, body: JSON.stringify(body || {}) });
      if (res.status === 401) { localStorage.removeItem('duckpipe_token'); window.location.hash = '#/setup'; throw new Error('Unauthorized'); }
      if (!res.ok) { const p = await res.json().catch(() => ({})); throw new Error(p.error || `API ${res.status}`); }
      return res.json();
    }

    // SSE
    const sseListeners = new Set();
    let sseConnected = false;
    function connectSSE() {
      if (sseConnected) return;
      try {
        const url = TOKEN ? '/api/events?token=' + TOKEN : '/api/events';
        const es = new EventSource(url);
        es.onmessage = (ev) => { try { const d = JSON.parse(ev.data); sseListeners.forEach(fn => fn(d)); } catch {} };
        es.onerror = () => { sseConnected = false; setTimeout(connectSSE, 5000); };
        es.onopen = () => { sseConnected = true; };
      } catch {}
    }
    connectSSE();
    function useSSE(handler) { useEffect(() => { sseListeners.add(handler); return () => sseListeners.delete(handler); }, [handler]); }

    function useApi(path, deps = []) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const fetchData = useCallback(async () => {
        try { setLoading(true); const d = await api(path); setData(d); setError(null); }
        catch (e) { setError(e.message); } finally { setLoading(false); }
      }, [path, ...deps]);
      useEffect(() => { fetchData(); const iv = setInterval(fetchData, POLL); return () => clearInterval(iv); }, [fetchData]);
      const sseHandler = useCallback((ev) => { if (ev.type === 'workflow_complete' || ev.type === 'audit_entry' || ev.type === 'incident') fetchData(); }, [fetchData]);
      useSSE(sseHandler);
      return { data, loading, error, refetch: fetchData };
    }

    // ── Formatters ──
    function parseDateLike(v) {
      if (!v) return null; const r = String(v).trim(); if (!r) return null;
      const n = /(?:Z|[+-]\d\d:\d\d)$/.test(r) ? r : r.includes('T') ? r + 'Z' : r.replace(' ', 'T') + 'Z';
      const p = new Date(n); return Number.isNaN(p.getTime()) ? null : p;
    }
    function fmtTime(iso) { const p = parseDateLike(iso); if (!p) return iso || '\u2014'; return p.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }); }
    function fmtDate(iso) { const p = parseDateLike(iso); if (!p) return iso || '\u2014'; return p.toLocaleDateString(undefined, { month:'short', day:'numeric' }); }
    function fmtRelative(iso) {
      const p = parseDateLike(iso); if (!p) return '';
      const diff = Date.now() - p.getTime(); const m = Math.floor(diff / 60000);
      if (m < 1) return 'just now'; if (m < 60) return m + 'm ago';
      const hrs = Math.floor(m / 60); if (hrs < 24) return hrs + 'h ago';
      return Math.floor(hrs / 24) + 'd ago';
    }
    function fmtDuration(ms) { if (!ms && ms !== 0) return '\u2014'; if (ms < 1000) return ms + 'ms'; const s = Math.floor(ms/1000); if (s < 60) return s + 's'; return Math.floor(s/60) + 'm ' + (s%60) + 's'; }
    function fmtNumber(n) { if (n == null) return '\u2014'; return n.toLocaleString(); }
    function tryFormat(json) { if (!json) return null; try { return JSON.stringify(JSON.parse(json), null, 2); } catch { return json; } }

    // ── Shared Components ──
    function Badge({ label, color = 'slate' }) {
      const c = { green:'bg-emerald-500/15 text-emerald-400 border-emerald-500/25', red:'bg-red-500/15 text-red-400 border-red-500/25', yellow:'bg-amber-500/15 text-amber-400 border-amber-500/25', blue:'bg-blue-500/15 text-blue-400 border-blue-500/25', slate:'bg-slate-500/15 text-slate-400 border-slate-500/25', purple:'bg-purple-500/15 text-purple-400 border-purple-500/25', indigo:'bg-indigo-500/15 text-indigo-400 border-indigo-500/25' };
      return h('span', { className: `inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-semibold border ${c[color]||c.slate}` }, label);
    }
    function StatusDot({ status }) {
      const color = status === 'completed' || status === 'healthy' || status === true ? 'bg-emerald-400' : status === 'running' ? 'bg-blue-400 pulse-dot' : status === 'failed' || status === false ? 'bg-red-400' : 'bg-slate-500';
      return h('span', { className: `inline-block w-2 h-2 rounded-full ${color}` });
    }
    function Loader() { return h('div', { className: 'flex items-center justify-center py-20' }, h(RefreshCw, { size: 28, className: 'animate-spin text-slate-600' })); }
    function EmptyState({ icon, message }) { return h('div', { className: 'flex flex-col items-center justify-center py-16 text-slate-600' }, h(icon, { size: 44, className: 'mb-3 opacity-30' }), h('p', { className: 'text-sm' }, message)); }

    function SeverityBadge({ severity }) {
      const s = String(severity || 'P3');
      const cls = s === 'P1' ? 'bg-red-500/20 text-red-300 border-red-500/30 ring-1 ring-red-500/20' : s === 'P2' ? 'bg-amber-500/20 text-amber-300 border-amber-500/30 ring-1 ring-amber-500/20' : 'bg-indigo-500/20 text-indigo-300 border-indigo-500/30 ring-1 ring-indigo-500/20';
      return h('span', { className: `inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-xs font-bold border ${cls}` }, h(AlertTriangle, { size: 12 }), s);
    }

    // ── Icon-only Sidebar ──
    const NAV = [
      { id: '', label: 'Incidents', icon: BookOpen },
      { id: 'ops', label: 'Operations', icon: Radio },
      { id: 'settings', label: 'Settings', icon: Settings },
    ];

    function IconSidebar({ page, onNav }) {
      return h('aside', { className: 'fixed top-0 left-0 w-[56px] h-screen bg-surface-1 border-r border-slate-800/60 flex flex-col items-center z-40' },
        h('div', { className: 'pt-4 pb-3' },
          h('span', { className: 'text-xl cursor-pointer', onClick: () => onNav(''), title: 'DuckPipe' }, '\u{1F986}'),
        ),
        h('div', { className: 'w-8 h-px bg-slate-800 mb-3' }),
        h('nav', { className: 'flex-1 flex flex-col gap-1 items-center' },
          NAV.map(item => {
            const active = page === item.id;
            return h('button', {
              key: item.id, onClick: () => onNav(item.id), title: item.label,
              className: `w-10 h-10 flex items-center justify-center rounded-xl transition-all ${active ? 'bg-indigo-500/15 text-indigo-400 shadow-lg shadow-indigo-500/5' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/60'}`,
            }, h(item.icon, { size: 20 }));
          }),
        ),
        h('div', { className: 'pb-4 flex flex-col items-center gap-2' },
          h('a', { href: 'https://duckcode.ai', target: '_blank', title: 'Duckcode.ai', className: 'text-slate-700 hover:text-slate-500 transition-colors' }, h(ExternalLink, { size: 12 })),
        ),
      );
    }

    // ── Chat Drawer (slide-out) ──
    function ChatDrawer({ incidentId, severity, onClose }) {
      const [chat, setChat] = useState(null);
      const [loading, setLoading] = useState(true);
      const [sending, setSending] = useState(false);
      const [question, setQuestion] = useState('');
      const [error, setError] = useState(null);
      const [closing, setClosing] = useState(false);
      const messagesRef = useRef(null);

      const loadChat = useCallback(async () => {
        if (!incidentId) return;
        try { setLoading(true); const d = await api(`incidents/${incidentId}/chat`); setChat(d); setError(null); }
        catch (err) { setError(err.message || String(err)); } finally { setLoading(false); }
      }, [incidentId]);
      useEffect(() => { loadChat(); }, [loadChat]);
      useEffect(() => { if (messagesRef.current) messagesRef.current.scrollTop = messagesRef.current.scrollHeight; }, [chat?.messages?.length, sending]);

      const submitQuestion = useCallback(async (promptText) => {
        const q = String(promptText || question).trim(); if (!q) return;
        try {
          setSending(true); setError(null);
          const result = await apiPost(`incidents/${incidentId}/chat`, { question: q });
          setQuestion('');
          setChat(prev => ({ ...(prev||{}), incidentRunId: result.incidentRunId, messages: [...(prev?.messages||[]), ...(result.messages||[])], suggestedQuestions: result.suggestedQuestions || prev?.suggestedQuestions || [], workspace: result.workspace || prev?.workspace || null }));
        } catch (err) { setError(err.message || String(err)); } finally { setSending(false); }
      }, [incidentId, question]);

      const handleClose = () => { setClosing(true); setTimeout(onClose, 250); };
      const handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitQuestion(question); } };
      const prompts = (chat?.suggestedQuestions?.length ? chat.suggestedQuestions : ['What exactly failed?', 'Show the dbt lineage.', 'Who should fix this?', 'What should I check next?']).slice(0, 4);

      return h('div', { className: 'fixed inset-0 z-50 flex justify-end' },
        // Backdrop
        h('div', { className: `absolute inset-0 bg-black/40 ${closing ? 'opacity-0' : 'opacity-100'} transition-opacity`, onClick: handleClose }),
        // Drawer
        h('div', { className: `relative w-full max-w-[520px] h-full bg-surface-1 border-l border-slate-800/60 flex flex-col ${closing ? 'drawer-exit' : 'drawer-enter'}` },
          // Header
          h('div', { className: 'flex items-center justify-between px-5 py-4 border-b border-slate-800/60' },
            h('div', { className: 'flex items-center gap-3' },
              h(MessageSquare, { size: 18, className: 'text-indigo-400' }),
              h('div', null,
                h('h3', { className: 'text-sm font-bold text-white' }, 'Investigation Chat'),
                h('p', { className: 'text-[11px] text-slate-500' }, 'Autonomous analysis with parallel sub-agents'),
              ),
            ),
            h('div', { className: 'flex items-center gap-2' },
              severity && h(SeverityBadge, { severity }),
              h('button', { onClick: handleClose, className: 'p-1.5 rounded-lg text-slate-500 hover:text-white hover:bg-slate-800 transition-colors' }, h(X, { size: 16 })),
            ),
          ),

          error && h('div', { className: 'mx-4 mt-3 rounded-lg border border-red-800/40 bg-red-950/30 px-3 py-2 text-xs text-red-300' }, error),

          // Workspace stats
          chat?.workspace && h('div', { className: 'px-5 py-2 flex gap-4 text-[11px] text-slate-500 border-b border-slate-800/30' },
            h('span', null, 'Facts: ' + (chat.workspace.facts?.length ?? chat.workspace.factCount ?? 0)),
            h('span', null, 'Hypotheses: ' + (chat.workspace.hypothesisCount ?? 0)),
            h('span', null, 'Turns: ' + (chat.workspace.conversationCount ?? chat.workspace.messageCount ?? 0)),
          ),

          // Messages
          h('div', { ref: messagesRef, className: 'flex-1 overflow-y-auto px-5 py-4 space-y-3' },
            loading && h('div', { className: 'flex items-center justify-center py-12' }, h(RefreshCw, { size: 20, className: 'animate-spin text-slate-600' })),
            !loading && (!chat?.messages || chat.messages.length === 0) && h('div', { className: 'text-center py-12 text-slate-500' },
              h(MessageSquare, { size: 36, className: 'mx-auto mb-3 opacity-30' }),
              h('p', { className: 'text-sm' }, 'Start the investigation'),
              h('p', { className: 'text-xs text-slate-600 mt-1' }, 'Ask a question or pick a prompt below'),
            ),
            chat?.messages?.map(msg => h(ChatBubble, { key: msg.id, message: msg })),
            sending && h('div', { className: 'flex items-center gap-2 px-3 py-3 rounded-xl bg-surface-2/60 border border-slate-700/30' },
              h(RefreshCw, { size: 14, className: 'animate-spin text-indigo-400' }),
              h('span', { className: 'text-xs text-slate-400' }, 'Analyzing incident context...'),
            ),
          ),

          // Prompt chips
          prompts.length > 0 && h('div', { className: 'px-5 py-2 flex flex-wrap gap-1.5 border-t border-slate-800/30' },
            prompts.map((p, i) => h('button', {
              key: i, onClick: () => submitQuestion(p), disabled: sending,
              className: 'text-[11px] px-2.5 py-1.5 rounded-lg bg-surface-2/60 border border-slate-700/30 text-slate-400 hover:text-white hover:border-slate-600/50 transition-colors text-left',
            }, p)),
          ),

          // Input
          h('div', { className: 'px-5 py-3 border-t border-slate-800/60' },
            h('div', { className: 'flex gap-2 items-end' },
              h('textarea', {
                value: question, onChange: e => setQuestion(e.target.value), onKeyDown: handleKey,
                placeholder: 'Ask anything about this incident...',
                className: 'flex-1 min-h-[56px] max-h-[120px] rounded-xl bg-surface-0 border border-slate-700/50 px-3 py-2.5 text-sm text-slate-200 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 focus:border-indigo-500/40 resize-none',
              }),
              h('button', {
                onClick: () => submitQuestion(question), disabled: sending || !question.trim(),
                className: 'self-end p-2.5 rounded-xl bg-indigo-600 text-white hover:bg-indigo-500 disabled:opacity-40 transition-colors',
              }, h(Send, { size: 16 })),
            ),
          ),
        ),
      );
    }

    function ChatBubble({ message }) {
      const [showDetails, setShowDetails] = useState(false);
      const inv = message.metadata?.investigation;
      const isUser = message.role !== 'assistant';

      if (isUser) {
        return h('div', { className: 'flex justify-end' },
          h('div', { className: 'max-w-[85%] rounded-2xl rounded-br-md px-4 py-2.5 bg-indigo-600/20 border border-indigo-500/20 text-sm text-slate-200' },
            h('p', { className: 'whitespace-pre-wrap leading-relaxed' }, message.content),
            h('p', { className: 'text-[10px] text-slate-500 mt-1 text-right' }, fmtRelative(message.createdAt)),
          ),
        );
      }

      const hypotheses = inv?.hypotheses || [];
      const topHyp = hypotheses[0];
      const subAgentNames = (inv?.subAgents || []).map(a => a.name).join(', ');
      const followUpCount = inv?.followUpInvestigations?.length || 0;

      return h('div', { className: 'max-w-[95%]' },
        h('div', { className: 'rounded-2xl rounded-bl-md px-4 py-3 bg-surface-2/50 border border-slate-700/30' },
          // Meta chips
          h('div', { className: 'flex items-center gap-2 mb-2 flex-wrap' },
            h('span', { className: 'text-[10px] font-semibold uppercase tracking-wider text-indigo-400' }, 'DuckPipe'),
            topHyp && h('span', { className: `text-[10px] px-1.5 py-0.5 rounded-md border ${topHyp.confidence === 'high' ? 'bg-emerald-900/30 text-emerald-400 border-emerald-700/30' : topHyp.confidence === 'medium' ? 'bg-amber-900/30 text-amber-400 border-amber-700/30' : 'bg-slate-800/60 text-slate-400 border-slate-700/30'}` }, topHyp.confidence),
            inv?.playbook && h('span', { className: 'text-[10px] px-1.5 py-0.5 rounded-md bg-indigo-900/30 text-indigo-300 border border-indigo-700/30' }, inv.playbook),
          ),
          h(MarkdownContent, { content: message.content, className: 'text-sm' }),
          (subAgentNames || followUpCount > 0) && h('div', { className: 'mt-2 flex flex-wrap gap-3 text-[10px] text-slate-500' },
            subAgentNames && h('span', null, 'Agents: ' + subAgentNames),
            followUpCount > 0 && h('span', null, 'Follow-ups: ' + followUpCount),
          ),
          inv && h('button', {
            className: 'mt-2 flex items-center gap-1 text-[11px] text-slate-500 hover:text-slate-300 transition-colors',
            onClick: () => setShowDetails(d => !d),
          }, h(showDetails ? ChevronDown : ChevronRight, { size: 12 }), showDetails ? 'Hide details' : 'View details'),
          showDetails && inv && h('div', { className: 'mt-2 pt-2 border-t border-slate-700/30 space-y-2' },
            hypotheses.length > 0 && h('div', null,
              h('p', { className: 'text-[10px] uppercase tracking-wider text-slate-500 mb-1' }, 'Hypotheses'),
              hypotheses.slice(0, 4).map((item, i) => h('div', { key: i, className: `text-[11px] rounded-lg px-2 py-1.5 mb-1 border ${item.status === 'supported' ? 'border-emerald-700/30 bg-emerald-950/20 text-emerald-300' : item.status === 'rejected' ? 'border-red-700/30 bg-red-950/20 text-red-300' : 'border-slate-700/30 bg-slate-900/40 text-slate-300'}` },
                h('span', { className: 'font-semibold' }, item.status.toUpperCase()), ' \u00B7 ', item.summary)),
            ),
            inv.facts?.length > 0 && h('div', null,

        ),

        // LLM Model
        h('div', { className: 'bg-surface-1 rounded-2xl border border-slate-800/50 p-6' },
          h('div', { className: 'flex items-center gap-2 mb-4' }, h(Zap, { size: 16, className: 'text-indigo-400' }), h('h3', { className: 'text-sm font-bold text-white' }, 'AI Provider & Model')),
          h('div', { className: 'flex items-center gap-3 mb-4' },
            activeProvider ? h(StatusDot, { status: 'healthy' }) : h(StatusDot, { status: 'failed' }),
            h('span', { className: 'text-sm font-semibold' }, activeProvider ? (providerNames[activeProvider] || activeProvider) : 'Not configured'),
            activeModel && h('span', { className: 'text-xs text-slate-400 font-mono' }, activeModel),
          ),
          h('div', { className: 'flex gap-1 mb-3' },
            ['anthropic', 'openai', 'gemini'].map(p => h('button', {
              key: p, onClick: () => { setSelectedProvider(p); setCustomModel(''); },
              className: `px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${showProvider === p ? 'bg-indigo-600 text-white' : 'bg-surface-2/50 text-slate-400 hover:text-white'}`,
            }, providerNames[p])),
          ),
          h('div', { className: 'space-y-1 mb-4 max-h-48 overflow-y-auto' },
            models.map(m => h('button', {
              key: m.id, onClick: () => setCustomModel(m.id),
              className: `w-full flex items-center justify-between rounded-lg px-3 py-2 text-left border transition-colors ${previewModel === m.id ? 'bg-indigo-900/30 border-indigo-600/40' : m.id === activeModel && activeProvider === showProvider ? 'bg-surface-2/40 border-emerald-700/30' : 'bg-surface-2/20 border-slate-700/30 hover:border-slate-600/50'}`,
            },
              h('div', { className: 'flex items-center gap-2' },
                h('span', { className: 'text-xs font-mono text-slate-200' }, m.id),
                h('span', { className: `text-[11px] ${tierColor[m.tier] || 'text-slate-400'}` }, m.label),
              ),
              h('div', { className: 'flex gap-1' },
                m.id === activeModel && activeProvider === showProvider && h('span', { className: 'text-[10px] px-1.5 py-0.5 rounded bg-emerald-900/40 text-emerald-400' }, 'IN USE'),
                previewModel === m.id && h('span', { className: 'text-[10px] px-1.5 py-0.5 rounded bg-indigo-700/40 text-indigo-300' }, 'SELECTED'),
              ),
            )),
          ),
          h('div', { className: 'flex gap-2 mb-3' },
            h('input', { type: 'text', value: customModel, onInput: e => setCustomModel(e.target.value), placeholder: 'Or type any model ID...', className: 'flex-1 bg-surface-0 border border-slate-700/50 rounded-lg px-3 py-2 text-xs font-mono text-slate-200 placeholder:text-slate-600 focus:outline-none focus:border-indigo-500/40' }),
          ),
          h('div', { className: 'rounded-lg bg-surface-0 border border-slate-700/40 p-3' },
            h('div', { className: 'flex items-center justify-between mb-2' },
              h('p', { className: 'text-[11px] text-slate-400' }, 'Paste into duckpipe.yaml'),
              h('button', { onClick: () => copy(yamlSnippet, 'y'), className: 'text-[11px] text-slate-400 hover:text-white px-2 py-0.5 rounded bg-surface-2/50 border border-slate-700/30' }, copied === 'y' ? 'Copied!' : 'Copy'),
            ),
            h('pre', { className: 'text-[11px] text-slate-300 font-mono' }, yamlSnippet),
          ),
          h('p', { className: 'text-[11px] text-slate-500 mt-2' }, 'Needs ', h('span', { className: 'font-mono text-slate-300' }, providerKeys[showProvider] || ''), ' in .env'),
        ),

        // Token
        h('div', { className: 'bg-surface-1 rounded-2xl border border-slate-800/50 p-6' },
          h('div', { className: 'flex items-center gap-2 mb-4' }, h(Shield, { size: 16, className: 'text-indigo-400' }), h('h3', { className: 'text-sm font-bold text-white' }, 'Dashboard Token')),
          h('div', { className: 'flex gap-2' },
            h('input', { type: 'password', value: token, onChange: e => setToken(e.target.value), placeholder: 'Enter dashboard token', className: 'flex-1 px-3 py-2 rounded-lg bg-surface-0 border border-slate-700/50 text-sm text-white placeholder:text-slate-600 focus:outline-none focus:border-indigo-500/40' }),
            h('button', { onClick: saveToken, className: 'px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-500' }, 'Save'),
            TOKEN && h('button', { onClick: clearToken, className: 'px-4 py-2 rounded-lg bg-red-600/20 text-red-400 text-sm hover:bg-red-600/30' }, 'Clear'),
          ),
          TOKEN && h('p', { className: 'text-xs text-emerald-400 mt-2' }, 'Token saved in browser.'),
        ),

        // Raw config
        config && h('div', { className: 'bg-surface-1 rounded-2xl border border-slate-800/50 p-6' },
          h('div', { className: 'flex items-center gap-2 mb-4' }, h(Terminal, { size: 16, className: 'text-indigo-400' }), h('h3', { className: 'text-sm font-bold text-white' }, 'Configuration (secrets masked)')),
          h('pre', { className: 'bg-surface-0 rounded-lg p-4 font-mono text-xs text-slate-400 overflow-x-auto max-h-80' }, JSON.stringify(config, null, 2)),
        ),
      );
    }

    // ── App Shell ──
    function App() {
      const [page, setPage] = useState(window.location.hash.slice(2) || '');
      const { data: health } = useApi('health');

      useEffect(() => {
        const onHash = () => setPage(window.location.hash.slice(2) || '');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const navigate = useCallback((p) => { window.location.hash = p ? '#/' + p : '#/'; setPage(p); }, []);

      const pageComponent = useMemo(() => {
        switch (page) {
          case 'ops': return h(OpsPage);
          case 'settings': return h(SettingsPage);
          default: return h(StoryPage);
        }
      }, [page]);

      return h('div', { className: 'flex min-h-screen' },
        h(IconSidebar, { page, onNav: navigate }),
        h('div', { className: 'flex-1 ml-[56px]' },
          h('main', { className: 'px-8 py-6 max-w-[1200px] mx-auto' }, pageComponent),
        ),
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
