<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuckPipe — Observability Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: { brand: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',800:'#065f46',900:'#064e3b' } },
        },
      },
    };
  </script>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
      "lucide-react": "https://esm.sh/lucide-react@0.462.0?external=react"
    }
  }
  </script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #334155 #0f172a; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
    .counter { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    table tbody tr:hover { background-color: rgba(51,65,85,0.4) !important; }
    .chart-container { min-height: 280px; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect, useCallback, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      AreaChart, Area, BarChart, Bar, LineChart, Line, PieChart, Pie, Cell,
      XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend
    } from 'recharts';
    import {
      Activity, AlertTriangle, BarChart3, CheckCircle2, ChevronRight, Clock,
      CreditCard, Database, Download, ExternalLink, FileText, Filter, Home,
      Layers, Moon, RefreshCw, Search, Server, Settings, Shield, Sun,
      Terminal, XCircle, Zap, TrendingUp, Eye, GitBranch, MessageSquare
    } from 'lucide-react';

    const h = React.createElement;
    const POLL_INTERVAL = 30000;
    const COLORS = { success: '#10b981', warning: '#f59e0b', error: '#ef4444', info: '#3b82f6', muted: '#64748b' };
    const PIE_COLORS = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

    // ── API fetch helper ──────────────────────────────────────────────────
    const TOKEN = localStorage.getItem('duckpipe_token') || '';
    function authHeaders() {
      const h = {};
      if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
      return h;
    }

    async function api(path) {
      const res = await fetch('/api/' + path, { headers: authHeaders() });
      if (res.status === 401) {
        localStorage.removeItem('duckpipe_token');
        window.location.hash = '#/setup';
        throw new Error('Unauthorized');
      }
      if (!res.ok) throw new Error(`API ${res.status}`);
      return res.json();
    }

    async function apiPost(path, body) {
      const res = await fetch('/api/' + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify(body || {}),
      });
      if (res.status === 401) {
        localStorage.removeItem('duckpipe_token');
        window.location.hash = '#/setup';
        throw new Error('Unauthorized');
      }
      if (!res.ok) {
        const payload = await res.json().catch(() => ({}));
        throw new Error(payload.error || `API ${res.status}`);
      }
      return res.json();
    }

    // SSE event bus — replaces polling for real-time updates
    const sseListeners = new Set();
    let sseConnected = false;
    function connectSSE() {
      if (sseConnected) return;
      try {
        const url = TOKEN ? '/api/events?token=' + TOKEN : '/api/events';
        const es = new EventSource(url);
        es.onmessage = (ev) => {
          try {
            const data = JSON.parse(ev.data);
            sseListeners.forEach(fn => fn(data));
          } catch {}
        };
        es.onerror = () => { sseConnected = false; setTimeout(connectSSE, 5000); };
        es.onopen = () => { sseConnected = true; };
      } catch {}
    }
    connectSSE();

    function useSSE(handler) {
      useEffect(() => {
        sseListeners.add(handler);
        return () => sseListeners.delete(handler);
      }, [handler]);
    }

    function useApi(path, deps = []) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const fetchData = useCallback(async () => {
        try {
          setLoading(true);
          const d = await api(path);
          setData(d);
          setError(null);
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }, [path, ...deps]);
      useEffect(() => { fetchData(); const iv = setInterval(fetchData, POLL_INTERVAL); return () => clearInterval(iv); }, [fetchData]);
      // Refresh on SSE events related to this data
      const sseHandler = useCallback((ev) => {
        if (ev.type === 'workflow_complete' || ev.type === 'audit_entry' || ev.type === 'incident') fetchData();
      }, [fetchData]);
      useSSE(sseHandler);
      return { data, loading, error, refetch: fetchData };
    }

    // ── Formatters ────────────────────────────────────────────────────────
    function parseDateLike(value) {
      if (!value) return null;
      const raw = String(value).trim();
      if (!raw) return null;
      const normalized = /(?:Z|[+-]\d\d:\d\d)$/.test(raw)
        ? raw
        : raw.includes('T')
          ? raw + 'Z'
          : raw.replace(' ', 'T') + 'Z';
      const parsed = new Date(normalized);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }
    function fmtTime(iso) {
      const parsed = parseDateLike(iso);
      if (!parsed) return iso || '—';
      return parsed.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }
    function fmtDate(iso) {
      const parsed = parseDateLike(iso);
      if (!parsed) return iso || '—';
      return parsed.toLocaleDateString(undefined, { month:'short', day:'numeric' });
    }
    function fmtDuration(ms) { if (!ms && ms !== 0) return '—'; if (ms < 1000) return ms + 'ms'; const s = Math.floor(ms/1000); if (s < 60) return s + 's'; const m = Math.floor(s/60); return m + 'm ' + (s%60) + 's'; }
    function fmtNumber(n) { if (n == null) return '—'; return n.toLocaleString(); }

    // ── Shared components ─────────────────────────────────────────────────
    function Badge({ label, color = 'slate' }) {
      const colors = { green: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30', red: 'bg-red-500/20 text-red-400 border-red-500/30', yellow: 'bg-amber-500/20 text-amber-400 border-amber-500/30', blue: 'bg-blue-500/20 text-blue-400 border-blue-500/30', slate: 'bg-slate-500/20 text-slate-400 border-slate-500/30', purple: 'bg-purple-500/20 text-purple-400 border-purple-500/30' };
      return h('span', { className: `inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium border ${colors[color] || colors.slate}` }, label);
    }

    function MetricCard({ icon, label, value, sub, color = 'brand' }) {
      const iconColors = { brand: 'text-emerald-400 bg-emerald-500/10', red: 'text-red-400 bg-red-500/10', amber: 'text-amber-400 bg-amber-500/10', blue: 'text-blue-400 bg-blue-500/10' };
      return h('div', { className: 'bg-slate-800/80 border border-slate-700/50 rounded-xl p-5 fade-in hover:border-slate-600/50 transition-colors' },
        h('div', { className: 'flex items-center gap-3 mb-3' },
          h('div', { className: `p-2 rounded-lg ${iconColors[color] || iconColors.brand}` }, h(icon, { size: 20 })),
          h('span', { className: 'text-sm text-slate-400 font-medium' }, label),
        ),
        h('div', { className: 'text-3xl font-bold tracking-tight counter' }, value ?? '—'),
        sub && h('p', { className: 'text-xs text-slate-500 mt-1' }, sub),
      );
    }

    function Card({ title, icon, children, actions, className = '' }) {
      return h('div', { className: `bg-slate-800/80 border border-slate-700/50 rounded-xl fade-in ${className}` },
        (title || actions) && h('div', { className: 'flex items-center justify-between px-5 py-4 border-b border-slate-700/50' },
          h('div', { className: 'flex items-center gap-2' },
            icon && h(icon, { size: 16, className: 'text-slate-400' }),
            title && h('h3', { className: 'text-sm font-semibold text-slate-200' }, title),
          ),
          actions,
        ),
        h('div', { className: 'p-5' }, children),
      );
    }

    function StatusDot({ status }) {
      const color = status === 'completed' || status === 'healthy' || status === true ? 'bg-emerald-400' : status === 'running' ? 'bg-blue-400 pulse-dot' : status === 'failed' || status === false ? 'bg-red-400' : 'bg-slate-500';
      return h('span', { className: `inline-block w-2 h-2 rounded-full ${color}` });
    }

    function EmptyState({ icon, message }) {
      return h('div', { className: 'flex flex-col items-center justify-center py-12 text-slate-500' },
        h(icon, { size: 40, className: 'mb-3 opacity-40' }),
        h('p', { className: 'text-sm' }, message),
      );
    }

    function Loader() {
      return h('div', { className: 'flex items-center justify-center py-16' },
        h(RefreshCw, { size: 24, className: 'animate-spin text-slate-500' }),
      );
    }

    function DaysToggle({ value, onChange }) {
      return h('div', { className: 'flex gap-1 bg-slate-900/50 rounded-lg p-1' },
        [7, 30, 90].map(d =>
          h('button', {
            key: d,
            onClick: () => onChange(d),
            className: `px-3 py-1 text-xs rounded-md font-medium transition-colors ${value === d ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-slate-200'}`
          }, d + 'd')
        )
      );
    }

    function ChartTooltip({ active, payload, label, formatter }) {
      if (!active || !payload?.length) return null;
      return h('div', { className: 'bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-xs shadow-xl' },
        h('p', { className: 'text-slate-300 mb-1 font-medium' }, formatter ? formatter(label) : label),
        payload.map((p, i) => h('p', { key: i, className: 'flex items-center gap-2' },
          h('span', { className: 'w-2 h-2 rounded-full', style: { background: p.color } }),
          h('span', { className: 'text-slate-400' }, p.name + ': '),
          h('span', { className: 'font-medium text-white' }, typeof p.value === 'number' ? p.value.toLocaleString() : p.value),
        ))
      );
    }

    // ── Navigation ────────────────────────────────────────────────────────
    const NAV_ITEMS = [
      { id: '', label: 'Overview', icon: Home },
      { id: 'incidents', label: 'Incidents', icon: AlertTriangle },
      { id: 'costs', label: 'Cost Monitor', icon: CreditCard },
      { id: 'pipelines', label: 'Pipeline Health', icon: Layers },
      { id: 'approvals', label: 'Approvals', icon: CheckCircle2 },
      { id: 'agents', label: 'Agents', icon: Server },
      { id: 'audit', label: 'Audit Log', icon: Shield },
      { id: 'setup', label: 'Setup', icon: Zap },
      { id: 'settings', label: 'Settings', icon: Settings },
    ];

    function Sidebar({ page, onNav }) {
      return h('aside', { className: 'fixed top-0 left-0 w-60 h-screen bg-slate-900 border-r border-slate-800 flex flex-col z-30' },
        // Logo
        h('div', { className: 'p-5 border-b border-slate-800' },
          h('div', { className: 'flex items-center gap-2.5' },
            h('span', { className: 'text-2xl' }, '\u{1F986}'),
            h('div', null,
              h('h1', { className: 'text-base font-bold text-white tracking-tight' }, 'DuckPipe'),
              h('p', { className: 'text-[10px] text-slate-500 font-medium tracking-wider uppercase' }, 'Observability'),
            ),
          ),
        ),
        // Nav
        h('nav', { className: 'flex-1 p-3 space-y-0.5 overflow-y-auto' },
          NAV_ITEMS.map(item => {
            const active = page === item.id;
            return h('button', {
              key: item.id,
              onClick: () => onNav(item.id),
              className: `w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all ${active ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 border border-transparent'}`
            },
              h(item.icon, { size: 18 }),
              item.label,
            );
          })
        ),
        // Footer
        h('div', { className: 'p-4 border-t border-slate-800' },
          h('a', { href: 'https://duckcode.ai', target: '_blank', className: 'text-[10px] text-slate-600 hover:text-slate-400 flex items-center gap-1' },
            'Built by Duckcode.ai', h(ExternalLink, { size: 10 }),
          ),
        ),
      );
    }

    function TopBar({ darkMode, onToggle, health }) {
      return h('header', { className: 'sticky top-0 z-20 bg-slate-900/80 backdrop-blur-xl border-b border-slate-800/50 px-6 py-3 flex items-center justify-between' },
        h('div', { className: 'flex items-center gap-4' },
          health?.team_name && h('span', { className: 'text-sm text-slate-400' }, health.team_name),
          health?.trust_tier && h(Badge, { label: 'Tier ' + health.trust_tier, color: health.trust_tier === 1 ? 'green' : health.trust_tier === 2 ? 'yellow' : 'purple' }),
          health?.uptime_human && h('span', { className: 'text-xs text-slate-500 flex items-center gap-1' }, h(Clock, { size: 12 }), 'Up ' + health.uptime_human),
        ),
        h('div', { className: 'flex items-center gap-3' },
          h('button', {
            onClick: onToggle,
            className: 'p-2 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition-colors',
            title: darkMode ? 'Light mode' : 'Dark mode'
          }, h(darkMode ? Sun : Moon, { size: 16 })),
        ),
      );
    }

    // ── Page: Overview ────────────────────────────────────────────────────
    // ── Latest Root Cause Story card ─────────────────────────────────────
    function LatestStoryCard() {
      const { data: story, loading } = useApi('story');

      if (loading) return null;

      // No story yet — give a helpful "waiting" state
      if (!story) {
        return h('div', { className: 'rounded-xl border border-slate-700/40 bg-slate-800/40 px-5 py-4' },
          h('div', { className: 'flex items-center gap-2 mb-2' },
            h(GitBranch, { size: 15, className: 'text-slate-500' }),
            h('span', { className: 'text-sm font-semibold text-slate-400' }, 'Root Cause Story'),
            h('span', { className: 'ml-2 text-xs px-1.5 py-0.5 rounded bg-emerald-900/40 text-emerald-500 border border-emerald-700/30' }, '✓ All clear'),
          ),
          h('p', { className: 'text-xs text-slate-500' },
            'No incidents or schema drift detected yet. This card will show a detailed root cause story the next time DuckPipe finds a real problem.',
          ),
          h('div', { className: 'flex gap-4 mt-2 text-[11px] text-slate-600' },
            h('span', null, 'incident-autopilot: every 2 min'),
            h('span', null, 'pipeline-whisperer: every 15 min'),
          ),
        );
      }

      // Show real incidents even when root-cause classification is still incomplete.
      const storyText = String(story.story ?? '');
      const hasRealContent = story.workflow === 'pipeline-whisperer'
        ? storyText.trim().length >= 20
        : Boolean(
            (story.rootCauseCategory && story.rootCauseCategory !== 'unknown')
            || (story.changedTables && story.changedTables.length > 0)
            || (story.affectedModelCount && story.affectedModelCount > 0)
            || story.dbtChangesFound > 0
            || story.anomaliesFound > 0
            || story.severity
            || (Array.isArray(story.topEvidence) && story.topEvidence.length > 0)
            || (Array.isArray(story.blastRadius) && story.blastRadius.length > 0)
            || (Array.isArray(story.incident_context?.evidence) && story.incident_context.evidence.length > 0)
            || (Array.isArray(story.incident_context?.impact?.affectedDags) && story.incident_context.impact.affectedDags.length > 0)
          );

      if (!hasRealContent) {
        return h('div', { className: 'rounded-xl border border-slate-700/40 bg-slate-800/40 px-5 py-4' },
          h('div', { className: 'flex items-center gap-2 mb-2' },
            h(GitBranch, { size: 15, className: 'text-slate-500' }),
            h('span', { className: 'text-sm font-semibold text-slate-400' }, 'Root Cause Story'),
            h('span', { className: 'ml-2 text-xs px-1.5 py-0.5 rounded bg-emerald-900/40 text-emerald-500 border border-emerald-700/30' }, '✓ All clear'),
          ),
          h('p', { className: 'text-xs text-slate-500' },
            'Workflows are running — no incidents or schema drift detected.',
          ),
          h('div', { className: 'flex gap-4 mt-2 text-[11px] text-slate-600' },
            h('span', null, 'Last checked: ' + fmtTime(story.started_at)),
          ),
        );
      }

      const severityColors = {
        P1: 'border-red-500/40 bg-red-950/20',
        P2: 'border-amber-500/40 bg-amber-950/20',
        P3: 'border-blue-500/40 bg-blue-950/20',
      };
      const sev = String(story.severity ?? '');
      const isSchema = story.workflow === 'pipeline-whisperer';
      const oncallSummary = String(story.story_output?.oncallSummary ?? story.story ?? '');
      const managerSummary = String(story.story_output?.managerSummary ?? '');
      const knowledgeSummary = String(story.story_output?.knowledgeSummary ?? story.story ?? '');
      const storyUnknowns = Array.isArray(story.unknowns) ? story.unknowns : [];
      const topEvidence = Array.isArray(story.topEvidence) ? story.topEvidence : [];
      const blastRadius = Array.isArray(story.blastRadius) ? story.blastRadius : [];
      const graphNodes = story.entityGraph?.nodes?.length || 0;
      const graphEdges = story.entityGraph?.edges?.length || 0;

      const storyDetails = h('div', { className: 'space-y-3' },
        h('div', { className: 'flex items-start justify-between mb-3' },
          h('div', { className: 'flex items-center gap-2' },
            h(isSchema ? GitBranch : AlertTriangle, { size: 15, className: sev === 'P1' ? 'text-red-400' : sev === 'P2' ? 'text-amber-400' : 'text-indigo-400' }),
            h('span', { className: 'text-sm font-semibold' },
              isSchema ? 'Latest Schema Drift Story' : `Latest Incident Story — ${sev || 'P3'}`,
            ),
          ),
          h('div', { className: 'flex items-center gap-3' },
            sev && h('span', { className: `text-xs px-2 py-0.5 rounded-full font-medium ${sev === 'P1' ? 'bg-red-900/60 text-red-300' : sev === 'P2' ? 'bg-amber-900/60 text-amber-300' : 'bg-blue-900/60 text-blue-300'}` }, sev),
            h('span', { className: 'text-xs text-slate-500' }, fmtTime(story.started_at)),
          ),
        ),

        h('div', { className: 'grid gap-3 md:grid-cols-2' },
          h('div', { className: 'bg-slate-900/45 rounded-lg px-4 py-3 border border-slate-700/30' },
            h('div', { className: 'text-[11px] uppercase tracking-wide text-slate-500 mb-2' }, 'On-call Summary'),
            h('pre', {
              className: 'text-xs text-slate-300 font-mono whitespace-pre-wrap leading-relaxed max-h-64 overflow-y-auto',
            }, oncallSummary),
          ),
          h('div', { className: 'bg-slate-900/45 rounded-lg px-4 py-3 border border-slate-700/30' },
            h('div', { className: 'text-[11px] uppercase tracking-wide text-slate-500 mb-2' }, 'Manager Summary'),
            h('p', { className: 'text-xs text-slate-300 leading-relaxed' }, managerSummary || 'No manager summary available.'),
            h('div', { className: 'flex flex-wrap gap-2 mt-3 text-[11px]' },
              story.likelyOwner && h('span', { className: 'px-2 py-1 rounded bg-slate-800 text-cyan-300 border border-slate-700/40' }, `Owner: ${story.likelyOwner}`),
              story.runbook && h('span', { className: 'px-2 py-1 rounded bg-slate-800 text-emerald-300 border border-slate-700/40' }, `Runbook: ${story.runbook}`),
              blastRadius.length > 0 && h('span', { className: 'px-2 py-1 rounded bg-slate-800 text-violet-300 border border-slate-700/40' }, `Blast radius: ${blastRadius.length}`),
              graphNodes > 0 && h('span', { className: 'px-2 py-1 rounded bg-slate-800 text-amber-300 border border-slate-700/40' }, `Graph: ${graphNodes} nodes / ${graphEdges} edges`),
            ),
          ),
        ),

        knowledgeSummary && h('div', { className: 'bg-slate-900/35 rounded-lg px-4 py-3 border border-slate-700/20' },
          h('div', { className: 'text-[11px] uppercase tracking-wide text-slate-500 mb-2' }, 'Deep Story'),
          h('pre', {
            className: 'text-xs text-slate-300 whitespace-pre-wrap leading-relaxed max-h-72 overflow-y-auto'
          }, knowledgeSummary),
        ),

        storyUnknowns.length > 0 && h('div', { className: 'bg-slate-900/35 rounded-lg px-4 py-3 border border-slate-700/20' },
          h('div', { className: 'text-[11px] uppercase tracking-wide text-slate-500 mb-2' }, 'Unknowns / Missing Context'),
          h('ul', { className: 'space-y-1 text-xs text-slate-300 list-disc list-inside' },
            storyUnknowns.map((item, idx) => h('li', { key: idx }, String(item)))
          ),
        ),

        topEvidence.length > 0 && h('div', { className: 'mt-3 bg-slate-900/35 rounded-lg px-4 py-3 border border-slate-700/20' },
          h('div', { className: 'text-[11px] uppercase tracking-wide text-slate-500 mb-2' }, 'Top Evidence'),
          h('ul', { className: 'space-y-1 text-xs text-slate-300 list-disc list-inside' },
            topEvidence.map((item, idx) => h('li', { key: idx }, String(item)))
          ),
        ),

        blastRadius.length > 0 && h('div', { className: 'mt-3 bg-slate-900/35 rounded-lg px-4 py-3 border border-slate-700/20' },
          h('div', { className: 'text-[11px] uppercase tracking-wide text-slate-500 mb-2' }, 'Blast Radius'),
          h('div', { className: 'flex flex-wrap gap-2' },
            blastRadius.slice(0, 10).map((asset, idx) => h('span', {
              key: idx,
              className: 'px-2 py-1 rounded bg-slate-800 text-slate-300 border border-slate-700/40 text-[11px]'
            }, `${asset.kind}: ${asset.name}`))
          ),
        ),

        // Quick stats
        h('div', { className: 'flex flex-wrap gap-4 mt-3 pt-3 border-t border-slate-700/30 text-xs text-slate-500' },
          story.rootCauseCategory && h('span', null, 'Category: ', h('span', { className: 'text-slate-300' }, String(story.rootCauseCategory))),
          story.dbtChangesFound > 0 && h('span', null, 'dbt changes: ', h('span', { className: 'text-amber-400' }, String(story.dbtChangesFound))),
          story.anomaliesFound > 0  && h('span', null, 'Data anomalies: ', h('span', { className: 'text-red-400' }, String(story.anomaliesFound))),
          story.affectedModelCount > 0 && h('span', null, 'Affected models: ', h('span', { className: 'text-purple-400' }, String(story.affectedModelCount))),
          story.changedTables?.length > 0 && h('span', null, 'Changed tables: ', h('span', { className: 'text-blue-400' }, String(story.changedTables.length))),
        ),
      );

      const chatPanel = story.workflow === 'incident-autopilot' && story.id
        ? h('div', { className: 'min-w-0' },
            h(IncidentChatCard, {
              incidentId: story.id,
              severity: sev || 'P3',
              suggestedPrompts: [
                'What exactly failed?',
                'Show the dbt lineage behind this failure.',
                'What does Snowflake say about the impacted object?',
                'What should I check next?'
              ],
            })
          )
        : null;

      return h('div', { className: `rounded-xl border px-5 py-4 ${severityColors[sev] ?? 'border-indigo-500/30 bg-indigo-950/20'}` },
        h('div', { className: chatPanel ? 'grid gap-4 xl:grid-cols-[minmax(0,1.2fr)_minmax(360px,0.8fr)] xl:items-start' : 'block' },
          h('div', { className: 'min-w-0' }, storyDetails),
          chatPanel,
        ),
      );
    }

    function IncidentChatCard({ incidentId, severity, suggestedPrompts = [] }) {
      const [chat, setChat] = useState(null);
      const [loading, setLoading] = useState(true);
      const [sending, setSending] = useState(false);
      const [question, setQuestion] = useState('');
      const [error, setError] = useState(null);
      const messagesRef = useRef(null);

      const loadChat = useCallback(async () => {
        if (!incidentId) return;
        try {
          setLoading(true);
          const data = await api(`incidents/${incidentId}/chat`);
          setChat(data);
          setError(null);
        } catch (err) {
          setError(err.message || String(err));
        } finally {
          setLoading(false);
        }
      }, [incidentId]);

      useEffect(() => {
        loadChat();
      }, [loadChat]);

      useEffect(() => {
        if (!messagesRef.current) return;
        messagesRef.current.scrollTop = messagesRef.current.scrollHeight;
      }, [chat?.messages?.length, sending]);

      const submitQuestion = useCallback(async (promptText) => {
        const nextQuestion = String(promptText || question).trim();
        if (!nextQuestion) return;

        try {
          setSending(true);
          setError(null);
          const result = await apiPost(`incidents/${incidentId}/chat`, { question: nextQuestion });
          setQuestion('');
          setChat((prev) => ({
            ...(prev || {}),
            incidentRunId: result.incidentRunId,
            messages: [...(prev?.messages || []), ...(result.messages || [])],
            suggestedQuestions: result.suggestedQuestions || prev?.suggestedQuestions || [],
            workspace: result.workspace || prev?.workspace || null,
          }));
        } catch (err) {
          setError(err.message || String(err));
        } finally {
          setSending(false);
        }
      }, [incidentId, question]);

      const prompts = (chat?.suggestedQuestions?.length ? chat.suggestedQuestions : suggestedPrompts).slice(0, 4);
      const latestAssistantMessage = [...(chat?.messages || [])].reverse().find((message) => message.role === 'assistant') || null;

      return h('div', { className: 'h-full bg-slate-950/45 rounded-xl px-4 py-4 border border-slate-700/30 backdrop-blur-sm' },
        h('div', { className: 'flex items-center justify-between mb-3 gap-3' },
          h('div', null,
            h('div', { className: 'text-[11px] uppercase tracking-wide text-slate-500' }, 'DuckPipe Copilot'),
            h('p', { className: 'text-xs text-slate-400 mt-1 max-w-3xl leading-relaxed' }, `Ask follow-up questions about this ${severity} incident. DuckPipe investigates from the incident context first, then pulls live Airflow, dbt, and Snowflake evidence when available.`),
          ),
          h('button', {
            className: 'text-[11px] px-2 py-1 rounded bg-slate-800 border border-slate-700/40 text-slate-300 hover:text-white',
            onClick: loadChat,
            disabled: loading || sending,
          }, loading ? 'Loading…' : 'Refresh'),
        ),

        error && h('div', { className: 'mb-3 rounded border border-red-800/40 bg-red-950/30 px-3 py-2 text-xs text-red-300' }, error),

        chat?.workspace && h('div', { className: 'mb-3 rounded-lg bg-slate-900/50 border border-slate-700/30 px-3 py-2' },
          h('div', { className: 'text-[10px] uppercase tracking-wide text-slate-500 mb-2' }, 'Incident Workspace'),
          h('div', { className: 'grid grid-cols-2 gap-2 text-[11px] text-slate-300' },
            h('div', null, `Facts remembered: ${chat.workspace.facts?.length ?? chat.workspace.factCount ?? 0}`),
            h('div', null, `Hypotheses tracked: ${chat.workspace.hypothesisCount ?? 0}`),
            h('div', null, `Chat turns: ${chat.workspace.conversationCount ?? chat.workspace.messageCount ?? 0}`),
            h('div', null, `Updated: ${fmtTime(chat.workspace.lastUpdated)}`),
          ),
          Array.isArray(chat.workspace.openQuestions) && chat.workspace.openQuestions.length > 0 && h('div', { className: 'mt-2' },
            h('div', { className: 'text-[10px] uppercase tracking-wide text-slate-500 mb-1' }, 'Open Questions'),
            h('ul', { className: 'space-y-1 text-[11px] text-slate-300 list-disc list-inside' },
              chat.workspace.openQuestions.slice(0, 3).map((item, idx) => h('li', { key: idx }, item))

        ),

        latestAssistantMessage && h('div', { className: 'mb-3 rounded-lg bg-brand-950/20 border border-brand-800/30 px-3 py-2' },

          h('p', { className: 'text-xs text-slate-200 whitespace-pre-wrap leading-relaxed' }, latestAssistantMessage.content),
        ),

        h('div', { ref: messagesRef, className: 'space-y-2 min-h-[18rem] max-h-[32rem] overflow-y-auto pr-1 scroll-smooth' },
          (!chat?.messages || chat.messages.length === 0)
            ? h('div', { className: 'text-xs text-slate-500 py-3 leading-relaxed' }, 'No conversation yet. Start with a suggested prompt or ask your own question in natural language.')

              },

                ),
                h('p', { className: 'whitespace-pre-wrap leading-relaxed' }, message.content),
                message.role === 'assistant' && message.metadata?.investigation?.hypotheses?.length > 0 && h('div', { className: 'mt-2 space-y-2' },
                  h('div', { className: 'text-[10px] uppercase tracking-wide text-slate-500' }, 'Hypotheses'),
                  h('div', { className: 'space-y-1' },
                    message.metadata.investigation.hypotheses.slice(0, 3).map((item, idx) => h('div', {

                  ),

                message.role === 'assistant' && message.metadata?.investigation?.facts?.length > 0 && h('div', { className: 'mt-2 space-y-2' },
                  h('div', { className: 'text-[10px] uppercase tracking-wide text-slate-500' }, 'Facts'),
                  h('ul', { className: 'space-y-1 text-[11px] text-slate-300 list-disc list-inside' },

                message.role === 'assistant' && message.metadata?.investigation?.objectChecks?.length > 0 && h('div', { className: 'mt-2 space-y-2' },

                  h('div', { className: 'space-y-1' },
                    message.metadata.investigation.objectChecks.slice(0, 4).map((item, idx) => h('div', {
                      key: idx,
                      className: 'rounded bg-slate-900/70 border border-slate-700/30 px-2 py-1.5 text-[11px] text-slate-300'

                ),
                message.role === 'assistant' && (message.metadata?.investigation?.lineage?.failingModels?.length > 0 || message.metadata?.investigation?.lineage?.upstreamSources?.length > 0) && h('div', { className: 'mt-2 space-y-2' },
                  h('div', { className: 'text-[10px] uppercase tracking-wide text-slate-500' }, 'Lineage'),
                  h('div', { className: 'space-y-1 text-[11px] text-slate-300' },
                    message.metadata?.investigation?.lineage?.failingModels?.length > 0 && h('div', null, `Models: ${message.metadata.investigation.lineage.failingModels.slice(0, 4).join(', ')}`),
                    message.metadata?.investigation?.lineage?.upstreamSources?.length > 0 && h('div', null, `Sources: ${message.metadata.investigation.lineage.upstreamSources.slice(0, 4).join(', ')}`),
                    message.metadata?.investigation?.lineage?.modelSchemas?.length > 0 && h('div', null, `Schemas: ${message.metadata.investigation.lineage.modelSchemas.slice(0, 4).join(', ')}`),
                    message.metadata?.investigation?.lineage?.modelPaths?.length > 0 && h('div', null, `Files: ${message.metadata.investigation.lineage.modelPaths.slice(0, 3).join(', ')}`),
                  ),
                ),
                message.role === 'assistant' && message.metadata?.investigation?.nextChecks?.length > 0 && h('div', { className: 'mt-2 space-y-2' },
                  h('div', { className: 'text-[10px] uppercase tracking-wide text-slate-500' }, 'Next Checks'),
                  h('ul', { className: 'space-y-1 text-[11px] text-slate-300 list-disc list-inside' },
                    message.metadata.investigation.nextChecks.slice(0, 3).map((item, idx) => h('li', { key: idx }, item))
                  ),
                ),
                message.role === 'assistant' && message.metadata?.investigation?.priorIncidents?.length > 0 && h('div', { className: 'mt-2 space-y-2' },
                  h('div', { className: 'text-[10px] uppercase tracking-wide text-slate-500' }, 'Similar Prior Incidents'),
                  h('div', { className: 'space-y-1' },
                    message.metadata.investigation.priorIncidents.slice(0, 3).map((item, idx) => h('div', {
                      key: idx,
                      className: 'rounded bg-slate-900/60 border border-slate-700/30 px-2 py-1.5 text-[11px] text-slate-300'
                    }, `${fmtTime(item.startedAt)} · ${item.severity || '—'} · ${item.rootCause || item.incidentRunId}`))
                  ),

                message.role === 'assistant' && message.metadata?.investigation?.subAgents?.length > 0 && h('div', { className: 'mt-2 space-y-2' },
                  h('div', { className: 'text-[10px] uppercase tracking-wide text-slate-500' }, 'Specialist Sub-Agents'),
                  h('div', { className: 'space-y-1' },
                    message.metadata.investigation.subAgents.slice(0, 5).map((item, idx) => h('div', {
                      key: idx,
                      className: 'rounded bg-slate-900/60 border border-slate-700/30 px-2 py-1.5 text-[11px] text-slate-300'
                    }, `${item.name} · ${item.focus} · ${item.summary}`))
                  ),
                ),
                message.role === 'assistant' && message.metadata?.investigation?.externalContext?.slackMentions?.length > 0 && h('div', { className: 'mt-2 space-y-2' },

                  h('div', { className: 'space-y-1' },

                  h('div', { className: 'space-y-1' },
                    message.metadata.investigation.externalContext.jiraIssues.slice(0, 3).map((item, idx) => h('div', {
                      key: idx,
                      className: 'rounded bg-slate-900/60 border border-slate-700/30 px-2 py-1.5 text-[11px] text-slate-300'
                    }, `${item.key} · ${item.status || '—'} · ${item.summary}`))
                  ),
                ),
                message.role === 'assistant' && message.metadata?.investigation?.externalContext?.confluencePages?.length > 0 && h('div', { className: 'mt-2 space-y-2' },
                  h('div', { className: 'text-[10px] uppercase tracking-wide text-slate-500' }, 'Confluence Context'),
                  h('div', { className: 'space-y-1' },

                      key: idx,

            disabled: sending || !question.trim(),
          }, sending ? 'Investigating…' : 'Ask'),

    function OverviewPage() {
      const { data: health, loading } = useApi('health');
      const { data: agents }          = useApi('agents');
      const { data: workflows }       = useApi('workflows');
      const { data: audit }           = useApi('audit?limit=15');

      if (loading && !health) return h(Loader);

      const integrations     = health?.integrations || {};
      const integrationList  = ['airflow','snowflake','dbt','slack','jira','confluence'];
      const agentList        = agents || [];
      const agentsRunning    = agentList.filter(a => a.running).length;
      const agentsTotal      = agentList.length || 4;
      const intConnected     = integrationList.filter(k => integrations[k] === 'configured').length;
      const llmOk            = !!health?.llm_provider;
      const allAgentsOk      = agentsRunning === agentsTotal && agentsTotal > 0;
      const anyAgentRunning  = agentsRunning > 0;

      // System health level: ok / warning / error
      const systemLevel = allAgentsOk && llmOk && intConnected > 0 ? 'ok'
                        : anyAgentRunning || llmOk ? 'warning'
                        : 'error';

      const systemColors = {
        ok:      { bar: 'bg-emerald-500/10 border-emerald-500/30', dot: 'bg-emerald-400', text: 'text-emerald-300', label: 'System Healthy' },
        warning: { bar: 'bg-amber-500/10  border-amber-500/30',  dot: 'bg-amber-400',   text: 'text-amber-300',  label: 'Needs Attention' },
        error:   { bar: 'bg-red-500/10    border-red-500/30',    dot: 'bg-red-400',      text: 'text-red-300',    label: 'Action Required' },
      };
      const sc = systemColors[systemLevel];

      // Build a plain-English status sentence
      const statusParts = [];
      if (agentsTotal > 0) statusParts.push(agentsRunning + '/' + agentsTotal + ' agents running');
      statusParts.push(intConnected + '/' + integrationList.length + ' integrations connected');
      if (!llmOk) statusParts.push('no LLM key configured');
      else statusParts.push('LLM: ' + (health.llm_provider === 'anthropic' ? 'Anthropic' : health.llm_provider === 'openai' ? 'OpenAI' : 'Gemini'));
      statusParts.push('Tier ' + (health?.trust_tier || 1));

      const tierLabel = health?.trust_tier === 1 ? 'Read-only' : health?.trust_tier === 2 ? 'Supervised writes' : 'Autonomous';

      const providerLabel = { anthropic: 'Anthropic Claude', openai: 'OpenAI GPT', gemini: 'Google Gemini' };

      return h('div', { className: 'space-y-5 fade-in' },

        // ── System status banner ──────────────────────────────────────────
        h('div', { className: `rounded-xl border px-5 py-4 flex items-center justify-between ${sc.bar}` },
          h('div', { className: 'flex items-center gap-3' },
            h('span', { className: `w-2.5 h-2.5 rounded-full shrink-0 ${sc.dot}` }),
            h('div', null,
              h('p', { className: `text-sm font-semibold ${sc.text}` }, sc.label),
              h('p', { className: 'text-xs text-slate-400 mt-0.5' }, statusParts.join('  ·  ')),
            ),
          ),
          h('div', { className: 'flex items-center gap-2 text-xs text-slate-500' },
            h('span', null, 'Up ' + (health?.uptime_human || '—')),
            h('span', { className: 'text-slate-700' }, '·'),
            h('span', null, health?.team_name || 'DuckPipe'),
          ),
        ),

        // ── Three info columns ────────────────────────────────────────────
        h('div', { className: 'grid grid-cols-3 gap-4' },

          // Agents
          h('div', { className: 'bg-slate-800/80 border border-slate-700/50 rounded-xl p-4' },
            h('div', { className: 'flex items-center gap-2 mb-3 pb-3 border-b border-slate-700/50' },
              h(Server, { size: 15, className: 'text-slate-400' }),
              h('span', { className: 'text-sm font-semibold text-slate-200' }, 'Agents'),
              h('span', { className: `ml-auto text-xs font-medium px-2 py-0.5 rounded-full ${allAgentsOk ? 'bg-emerald-900/50 text-emerald-400' : anyAgentRunning ? 'bg-amber-900/50 text-amber-400' : 'bg-red-900/50 text-red-400'}` },
                agentsRunning + '/' + agentsTotal + ' running',
              ),
            ),
            h('div', { className: 'space-y-2' },
              agentList.length === 0
                ? h('p', { className: 'text-xs text-slate-500 italic' }, 'Loading agent status…')
                : agentList.map(a =>
                    h('div', { key: a.name, className: 'flex items-center gap-2' },
                      h(StatusDot, { status: a.running ? 'healthy' : 'failed' }),
                      h('span', { className: 'text-xs font-medium capitalize flex-1' }, a.name),
                      h('span', { className: `text-[11px] ${a.running ? 'text-emerald-400' : 'text-red-400'}` },

                  h('p', { className: 'text-[11px] text-slate-400' },
                    'Check ',
                    h('span', { className: 'font-mono text-slate-300' }, 'agents.runtime'),
                    ' in duckpipe.yaml — use ',
                    h('span', { className: 'font-mono text-amber-300' }, '"process"'),
                    ' for local dev.',

            ),
          ),

          // LLM

            ),
            llmOk
              ? h('div', { className: 'space-y-2.5' },
                  h('div', { className: 'flex items-center gap-2' },
                    h(StatusDot, { status: 'healthy' }),
                    h('span', { className: 'text-xs font-medium text-emerald-300' },
                      providerLabel[health.llm_provider] || health.llm_provider,

                  h('div', { className: 'rounded bg-slate-900/60 px-3 py-2' },
                    h('p', { className: 'text-[11px] text-slate-500 mb-0.5' }, 'Active model'),
                    h('p', { className: 'text-xs font-mono text-slate-200' }, health.llm_model || 'provider default'),
                  ),
                  h('p', { className: 'text-[11px] text-slate-500' },
                    'Change model in ',
                    h('span', { className: 'font-mono text-slate-400' }, 'duckpipe.yaml'),
                    ' under ',
                    h('span', { className: 'font-mono text-slate-400' }, 'llm.model'),

                )
              : h('div', { className: 'space-y-2' },
                  h('div', { className: 'flex items-center gap-2' },
                    h(StatusDot, { status: 'failed' }),

    // ── Page: Cost Monitor ────────────────────────────────────────────────
    function CostsPage() {
      const [days, setDays] = useState(7);
      const { data, loading } = useApi('costs?days=' + days, [days]);

      if (loading && !data) return h(Loader);

      const costRuns = data?.cost_runs || [];
      const dailyCounts = (data?.daily_counts || []).map(d => ({ ...d, day: fmtDate(d.day) }));
      const killActions = data?.kill_actions || [];

      // Extract cost data from run results
      const allQueries = [];
      const warehouseCosts = {};
      costRuns.forEach(r => {
        const pr = r.parsed_result || {};
        (pr.expensiveQueries || []).forEach(q => {
          allQueries.push(q);
          const wh = q.warehouse || 'unknown';
          warehouseCosts[wh] = (warehouseCosts[wh] || 0) + (q.creditsConsumed || 0);
        });
      });
      const whData = Object.entries(warehouseCosts).map(([name, credits]) => ({ name, credits: Math.round(credits * 100) / 100 })).sort((a,b) => b.credits - a.credits);
      const topQueries = allQueries.sort((a,b) => (b.creditsConsumed||0) - (a.creditsConsumed||0)).slice(0, 20);
      const totalCredits = allQueries.reduce((s, q) => s + (q.creditsConsumed || 0), 0);

      return h('div', { className: 'space-y-6 fade-in' },
        h('div', { className: 'flex items-center justify-between' },
          h('h2', { className: 'text-lg font-bold' }, 'Cost Monitor'),
          h(DaysToggle, { value: days, onChange: setDays }),
        ),

        h('div', { className: 'grid grid-cols-4 gap-4' },
          h(MetricCard, { icon: CreditCard, label: 'Total Credits', value: totalCredits.toFixed(1), color: totalCredits > 500 ? 'red' : 'amber' }),
          h(MetricCard, { icon: Database, label: 'Warehouses Tracked', value: Object.keys(warehouseCosts).length.toString(), color: 'blue' }),
          h(MetricCard, { icon: XCircle, label: 'Queries Killed', value: fmtNumber(killActions.length), color: 'red' }),
          h(MetricCard, { icon: Eye, label: 'Scans', value: fmtNumber(costRuns.length), color: 'brand' }),
        ),

        h('div', { className: 'grid grid-cols-3 gap-4' },
          h(Card, { title: 'Credit Consumption Trend', icon: TrendingUp, className: 'col-span-2' },
            dailyCounts.length > 0 ? h('div', { className: 'chart-container' },
              h(ResponsiveContainer, { width: '100%', height: 280 },
                h(LineChart, { data: dailyCounts },
                  h(CartesianGrid, { strokeDasharray: '3 3', stroke: '#1e293b' }),
                  h(XAxis, { dataKey: 'day', stroke: '#475569', tick: { fontSize: 11 } }),
                  h(YAxis, { stroke: '#475569', tick: { fontSize: 11 } }),
                  h(Tooltip, { content: h(ChartTooltip, {}) }),
                  h(Line, { type: 'monotone', dataKey: 'count', name: 'Scans', stroke: COLORS.warning, strokeWidth: 2, dot: { fill: COLORS.warning, r: 3 } }),
                ),
              ),
            ) : h(EmptyState, { icon: BarChart3, message: 'No cost data' }),
          ),

          h(Card, { title: 'Credits by Warehouse', icon: Database },
            whData.length > 0 ? h(ResponsiveContainer, { width: '100%', height: 280 },
              h(BarChart, { data: whData, layout: 'vertical' },
                h(CartesianGrid, { strokeDasharray: '3 3', stroke: '#1e293b' }),
                h(XAxis, { type: 'number', stroke: '#475569', tick: { fontSize: 11 } }),
                h(YAxis, { type: 'category', dataKey: 'name', stroke: '#475569', tick: { fontSize: 11 }, width: 100 }),
                h(Tooltip, { content: h(ChartTooltip, {}) }),
                h(Bar, { dataKey: 'credits', name: 'Credits', fill: COLORS.info, radius: [0, 4, 4, 0] }),
              ),

          ),
        ),

        h(Card, { title: 'Top Expensive Queries', icon: Zap },
          topQueries.length > 0 ? h('div', { className: 'overflow-x-auto' },
            h('table', { className: 'w-full text-sm' },
              h('thead', null,
                h('tr', { className: 'border-b border-slate-700/50' },
                  ['Query ID', 'User', 'Warehouse', 'Credits', 'Runtime', 'Preview'].map(col =>
                    h('th', { key: col, className: 'px-3 py-2.5 text-left text-xs font-medium text-slate-500 uppercase tracking-wider' }, col)

                ),

              h('tbody', null,
                topQueries.map((q, idx) =>

                    h('td', { className: 'px-3 py-2.5 text-xs font-mono' }, (q.queryId || '').slice(0, 12) + '...'),
                    h('td', { className: 'px-3 py-2.5 text-xs' }, q.user || '—'),
                    h('td', { className: 'px-3 py-2.5 text-xs' }, q.warehouse || '—'),
                    h('td', { className: 'px-3 py-2.5' }, h(Badge, { label: (q.creditsConsumed || 0).toFixed(1), color: (q.creditsConsumed || 0) > 100 ? 'red' : (q.creditsConsumed || 0) > 20 ? 'yellow' : 'green' })),

                    h('td', { className: 'px-3 py-2.5' }, h(StatusDot, { status: a.success === 1 })),

    // ── Page: Pipeline Health ─────────────────────────────────────────────
    function PipelinesPage() {
      const [days, setDays] = useState(7);
      const { data, loading } = useApi('pipelines?days=' + days, [days]);

      if (loading && !data) return h(Loader);

      const runHistory = data?.run_history || [];
      const schemaChanges = data?.schema_changes || [];
      const slaRuns = data?.sla_runs || [];

      // Build DAG duration chart
      const dagMap = {};
      runHistory.forEach(r => {
        const day = fmtDate(r.recorded_at);
        if (!dagMap[r.dag_id]) dagMap[r.dag_id] = {};
        if (!dagMap[r.dag_id][day]) dagMap[r.dag_id][day] = [];
        dagMap[r.dag_id][day].push(r.duration_seconds);
      });
      const dagIds = Object.keys(dagMap).slice(0, 8);
      const allDays = [...new Set(runHistory.map(r => fmtDate(r.recorded_at)))].sort();
      const trendData = allDays.map(day => {
        const entry = { day };
        dagIds.forEach(id => { entry[id] = dagMap[id]?.[day] ? Math.round(dagMap[id][day].reduce((a,b) => a+b, 0) / dagMap[id][day].length) : null; });
        return entry;
      });

      const totalRuns = runHistory.length;
      const successRuns = runHistory.filter(r => r.status === 'success').length;
      const slaCompliancePct = totalRuns > 0 ? Math.round((successRuns / totalRuns) * 100) : 100;

      // SLA warnings from sla_runs
      const slaWarnings = [];
      slaRuns.forEach(r => {
        try {
          const pr = r.result_json ? JSON.parse(r.result_json) : {};
          if (pr.warnings) slaWarnings.push(...pr.warnings);
        } catch { /* empty */ }
      });

      return h('div', { className: 'space-y-6 fade-in' },
        h('div', { className: 'flex items-center justify-between' },
          h('h2', { className: 'text-lg font-bold' }, 'Pipeline Health'),
          h(DaysToggle, { value: days, onChange: setDays }),
        ),

        h('div', { className: 'grid grid-cols-4 gap-4' },
          h(MetricCard, { icon: Activity, label: 'DAG Runs', value: fmtNumber(totalRuns), color: 'blue' }),
          h(MetricCard, { icon: CheckCircle2, label: 'SLA Compliance', value: slaCompliancePct + '%', color: slaCompliancePct >= 95 ? 'brand' : slaCompliancePct >= 80 ? 'amber' : 'red' }),
          h(MetricCard, { icon: GitBranch, label: 'Schema Changes', value: fmtNumber(schemaChanges.length), color: schemaChanges.length > 0 ? 'amber' : 'brand' }),
          h(MetricCard, { icon: AlertTriangle, label: 'SLA Warnings', value: fmtNumber(slaWarnings.length), color: slaWarnings.length > 0 ? 'red' : 'brand' }),
        ),

        // Duration trend
        h(Card, { title: 'DAG Duration Trends', icon: TrendingUp },
          trendData.length > 0 ? h('div', { className: 'chart-container' },
            h(ResponsiveContainer, { width: '100%', height: 300 },
              h(LineChart, { data: trendData },
                h(CartesianGrid, { strokeDasharray: '3 3', stroke: '#1e293b' }),
                h(XAxis, { dataKey: 'day', stroke: '#475569', tick: { fontSize: 11 } }),
                h(YAxis, { stroke: '#475569', tick: { fontSize: 11 }, label: { value: 'seconds', angle: -90, position: 'insideLeft', style: { fill: '#475569', fontSize: 11 } } }),
                h(Tooltip, { content: h(ChartTooltip, {}) }),
                h(Legend, { wrapperStyle: { fontSize: 11 } }),
                dagIds.map((id, i) =>
                  h(Line, { key: id, type: 'monotone', dataKey: id, name: id, stroke: PIE_COLORS[i % PIE_COLORS.length], strokeWidth: 2, dot: false, connectNulls: true })
                ),
              ),
            ),
          ) : h(EmptyState, { icon: Activity, message: 'No run history data' }),
        ),

        h('div', { className: 'grid grid-cols-2 gap-4' },
          // Schema drift timeline
          h(Card, { title: 'Schema Changes', icon: Database },
            schemaChanges.length > 0 ? h('div', { className: 'space-y-2 max-h-[300px] overflow-y-auto' },
              schemaChanges.map((sc, i) =>
                h('div', { key: i, className: 'flex items-center gap-3 py-2 border-b border-slate-700/30 last:border-0' },
                  h(GitBranch, { size: 14, className: 'text-amber-400 flex-shrink-0' }),
                  h('div', { className: 'flex-1 min-w-0' },
                    h('p', { className: 'text-xs font-medium truncate' }, sc.database_name + '.' + sc.schema_name + '.' + sc.table_name),
                    h('p', { className: 'text-[11px] text-slate-500' }, fmtTime(sc.captured_at)),
                  ),
                )
              ),
            ) : h(EmptyState, { icon: Database, message: 'No schema changes' }),
          ),

          // SLA warnings
          h(Card, { title: 'Active SLA Warnings', icon: AlertTriangle },
            slaWarnings.length > 0 ? h('div', { className: 'space-y-2 max-h-[300px] overflow-y-auto' },
              slaWarnings.map((w, i) =>

    function tryFormat(json) {
      if (!json) return null;
      try { return JSON.stringify(JSON.parse(json), null, 2); } catch { return json; }

    // ── Setup Wizard Page ────────────────────────────────────────────
    function SetupPage() {
      const { data: health } = useApi('health');
      const [step, setStep] = useState(0);
      const [token, setToken] = useState(localStorage.getItem('duckpipe_token') || '');
      const [verifyResult, setVerifyResult] = useState(null);
      const [verifying, setVerifying] = useState(false);

      const integrations = health?.integrations || {};
      const connectedCount = Object.values(integrations).filter(v => v === 'configured').length;
      const totalCount = Object.keys(integrations).length;

      const steps = [
        { label: 'Dashboard Token', desc: 'Secure your dashboard with a bearer token' },
        { label: 'Verify Connections', desc: 'Test all configured integration connections' },
        { label: 'Review Status', desc: 'Confirm everything is working' },
      ];

      const saveToken = () => {
        if (token.trim()) {
          localStorage.setItem('duckpipe_token', token.trim());
          window.location.reload();
        }
      };

      const runVerify = async () => {
        setVerifying(true);
        try {
          const result = await api('health');
          setVerifyResult(result);
        } catch (e) {
          setVerifyResult({ error: e.message });
        }
        setVerifying(false);
      };

      const clearToken = () => {
        localStorage.removeItem('duckpipe_token');
        window.location.reload();
      };

      return h('div', { className: 'space-y-6 fade-in max-w-3xl' },
        h('h2', { className: 'text-lg font-bold' }, 'Setup Wizard'),
        h('p', { className: 'text-sm text-slate-400' }, 'Configure and verify your DuckPipe installation'),

        // Progress
        h('div', { className: 'flex items-center gap-2 mb-6' },
          steps.map((s, i) => h('button', {
            key: i, onClick: () => setStep(i),
            className: `flex-1 p-3 rounded-lg border text-left transition-all ${i === step ? 'border-emerald-500/30 bg-emerald-500/5' : i < step ? 'border-emerald-500/10 bg-slate-800' : 'border-slate-700/30 bg-slate-900/30'}`
          },
            h('div', { className: 'flex items-center gap-2 mb-1' },
              h('span', { className: `w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${i <= step ? 'bg-emerald-500 text-white' : 'bg-slate-700 text-slate-400'}` }, i + 1),
              h('span', { className: 'text-sm font-medium' }, s.label),
            ),
            h('p', { className: 'text-[11px] text-slate-500 ml-8' }, s.desc),
          )),
        ),

        // Step content
        step === 0 && h(Card, { title: 'Dashboard Token', icon: Shield },
          h('p', { className: 'text-sm text-slate-400 mb-4' },
            'Set DUCKPIPE_DASHBOARD_TOKEN in your .env file, then enter it here. Without a token, the dashboard only binds to localhost.'
          ),
          h('div', { className: 'flex gap-2' },
            h('input', {
              type: 'password', value: token,
              onChange: (e) => setToken(e.target.value),
              placeholder: 'Enter your dashboard token',
              className: 'flex-1 px-3 py-2 rounded-lg bg-slate-900 border border-slate-700 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500'
            }),
            h('button', { onClick: saveToken, className: 'px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500' }, 'Save'),
            TOKEN && h('button', { onClick: clearToken, className: 'px-4 py-2 rounded-lg bg-red-600/20 text-red-400 text-sm hover:bg-red-600/30' }, 'Clear'),
          ),
          TOKEN && h('p', { className: 'text-xs text-emerald-400 mt-2' }, 'Token is saved in your browser.'),
          h('button', { onClick: () => setStep(1), className: 'mt-4 px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-sm hover:bg-slate-700' }, 'Next →'),
        ),

        step === 1 && h(Card, { title: 'Verify Connections', icon: Activity },
          h('p', { className: 'text-sm text-slate-400 mb-4' },
            'Test your integration connections. This calls duckpipe verify to check what is configured and accessible.'
          ),
          h('button', { onClick: runVerify, disabled: verifying, className: 'px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500 disabled:opacity-50 mb-4' },
            verifying ? 'Verifying...' : 'Run Verify'
          ),
          verifyResult && h('div', { className: 'mt-3 p-4 rounded-lg bg-slate-900 border border-slate-700 font-mono text-xs space-y-1' },
            verifyResult.error
              ? h('p', { className: 'text-red-400' }, 'Error: ' + verifyResult.error)
              : h('div', null,
                  h('p', { className: 'text-emerald-400' }, '✓ Connected — Tier ' + verifyResult.trust_tier),
                  h('p', { className: 'text-slate-400' }, 'Team: ' + verifyResult.team_name),
                  h('p', { className: 'text-slate-400' }, 'Uptime: ' + verifyResult.uptime_human),
                  h('p', { className: 'text-slate-400' }, 'Integrations:'),
                  Object.entries(verifyResult.integrations || {}).map(([k, v]) =>
                    h('p', { key: k, className: v === 'configured' ? 'text-emerald-400' : v === 'no_credentials' ? 'text-amber-400' : 'text-slate-500' },
                      (v === 'configured' ? '  ✓ ' : v === 'no_credentials' ? '  ⚠ ' : '  ✗ ') + k + (v === 'no_credentials' ? ' (no credentials)' : v === 'disabled' ? ' (disabled)' : '')
                    )
                  ),
                ),
          ),
          h('div', { className: 'flex gap-2 mt-4' },
            h('button', { onClick: () => setStep(0), className: 'px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-sm hover:bg-slate-700' }, '← Back'),
            h('button', { onClick: () => setStep(2), className: 'px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-sm hover:bg-slate-700' }, 'Next →'),
          ),
        ),

        step === 2 && h(Card, { title: 'Status Summary', icon: CheckCircle2 },
          h('div', { className: 'grid grid-cols-2 gap-4' },
            h('div', { className: 'p-4 rounded-lg bg-slate-900 border border-slate-700' },
              h('p', { className: 'text-sm font-medium mb-2' }, 'Integrations'),
              h('p', { className: 'text-2xl font-bold text-emerald-400' }, connectedCount + '/' + totalCount),
              h('p', { className: 'text-xs text-slate-500' }, 'connected'),
            ),
            h('div', { className: 'p-4 rounded-lg bg-slate-900 border border-slate-700' },
              h('p', { className: 'text-sm font-medium mb-2' }, 'Trust Tier'),
              h('p', { className: 'text-2xl font-bold' }, health?.trust_tier || '—'),
              h('p', { className: 'text-xs text-slate-500' }, health?.trust_tier === 1 ? 'Read-only' : health?.trust_tier === 2 ? 'Supervised' : 'Autonomous'),
            ),
          ),
          h('div', { className: 'mt-4 p-4 rounded-lg bg-emerald-500/5 border border-emerald-500/20' },
            h('p', { className: 'text-sm text-emerald-400 font-medium' }, '🦆 DuckPipe is configured!'),
            h('p', { className: 'text-xs text-slate-400 mt-1' }, 'Edit duckpipe.yaml and .env to adjust settings, then restart DuckPipe.'),
          ),
          h('button', { onClick: () => setStep(0), className: 'mt-4 px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-sm hover:bg-slate-700' }, '← Back'),
        ),
      );
    }

    // ── LLM Model Picker component ──────────────────────────────────────────
    function LlmModelPicker({ health, config }) {
      const { data: knownModels } = useApi('llm/models');
      const [selectedProvider, setSelectedProvider] = React.useState(null);
      const [copied, setCopied] = React.useState('');
      const [customModel, setCustomModel] = React.useState('');

      const providerNames = { anthropic: 'Anthropic Claude', openai: 'OpenAI GPT', gemini: 'Google Gemini' };
      const providerKeys  = { anthropic: 'ANTHROPIC_API_KEY', openai: 'OPENAI_API_KEY', gemini: 'GEMINI_API_KEY' };
      const providerDocs  = {
        anthropic: 'https://docs.anthropic.com/en/docs/about-claude/models',
        openai:    'https://platform.openai.com/docs/models',
        gemini:    'https://ai.google.dev/gemini-api/docs/models/gemini',
      };
      const activeProvider = health?.llm_provider;
      const activeModel    = health?.llm_model;
      const showProvider   = selectedProvider || activeProvider || 'anthropic';
      const models         = knownModels?.[showProvider] || [];

      // The model that will appear in the generated YAML snippet
      const previewModel = customModel.trim() || '';

      function copy(text, id) {
        navigator.clipboard.writeText(text).catch(() => {});
        setCopied(id);
        setTimeout(() => setCopied(''), 2000);
      }

      function selectModel(id) {
        setCustomModel(id);
      }

      const tierColor = { fast: 'text-emerald-400', balanced: 'text-blue-400', powerful: 'text-purple-400' };
      const tierIcon  = { fast: '⚡', balanced: '⚖️', powerful: '🧠' };

      const yamlSnippet =
`llm:
  provider: "${showProvider}"
  model: "${previewModel}"${previewModel ? '     # ← your chosen model' : '          # blank = provider default (fast & cheap)'}
  agents:
    comms: ""   # optional: stronger model for Jira/Confluence writing`;

      return h(Card, { title: 'AI Provider & Model', icon: Zap },

        // Active status bar
        h('div', { className: 'flex items-center justify-between mb-4 pb-4 border-b border-slate-700' },
          h('div', { className: 'flex items-center gap-3' },
            activeProvider ? h(StatusDot, { status: 'healthy' }) : h(StatusDot, { status: 'failed' }),
            h('div', null,
              h('p', { className: 'text-sm font-semibold' },
                activeProvider ? (providerNames[activeProvider] || activeProvider) : 'No provider configured',
              ),
              activeModel && h('p', { className: 'text-xs text-slate-400 font-mono mt-0.5' }, activeModel),
            ),
          ),
          h('div', { className: 'flex items-center gap-2' },
            activeProvider && h('span', { className: 'text-xs px-2 py-1 rounded-full bg-emerald-900/40 text-emerald-400 border border-emerald-700/40' }, 'Active'),
          ),
        ),

        // Callout: not restricted to the list
        h('div', { className: 'flex items-start gap-2 rounded-lg bg-indigo-950/40 border border-indigo-700/40 px-3 py-2 mb-4' },
          h('span', { className: 'text-indigo-400 mt-0.5 shrink-0' }, 'ℹ'),
          h('p', { className: 'text-xs text-indigo-200 leading-relaxed' },
            'You are ',
            h('strong', null, 'not limited'),
            ' to the models listed below. Type ',
            h('strong', null, 'any model ID'),
            ' in the field at the bottom — DuckPipe passes it directly to the provider API, so brand-new models work on day one without a DuckPipe update.',
          ),
        ),

        // Provider tabs
        h('div', { className: 'flex gap-1 mb-3' },
          ['anthropic', 'openai', 'gemini'].map(p =>
            h('button', {
              key: p,
              onClick: () => { setSelectedProvider(p); setCustomModel(''); },
              className: [
                'px-3 py-1.5 rounded-md text-xs font-medium transition-colors',
                showProvider === p
                  ? 'bg-indigo-600 text-white'
                  : 'bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white',
              ].join(' '),
            }, providerNames[p]),
          ),
          h('a', {
            href: providerDocs[showProvider],
            target: '_blank',
            rel: 'noopener',
            className: 'ml-auto px-2 py-1.5 text-[11px] text-slate-400 hover:text-white flex items-center gap-1',
          }, 'See all models →'),
        ),

        // Known model list for the selected provider
        h('div', { className: 'space-y-1.5 mb-4 max-h-60 overflow-y-auto pr-0.5' },
          models.length === 0 && h('p', { className: 'text-xs text-slate-500 italic py-2' }, 'Loading…'),
          models.map(m =>
            h('button', {
              key: m.id,
              onClick: () => selectModel(m.id),
              className: [
                'w-full flex items-center justify-between rounded-lg px-3 py-2 text-left transition-colors',
                previewModel === m.id
                  ? 'bg-indigo-900/40 border border-indigo-600/60 ring-1 ring-indigo-500/30'
                  : m.id === activeModel && activeProvider === showProvider
                    ? 'bg-slate-800 border border-emerald-700/50'
                    : 'bg-slate-800/50 border border-slate-700/50 hover:bg-slate-800 hover:border-slate-600',
              ].join(' '),
            },
              h('div', { className: 'flex items-center gap-2 flex-1 min-w-0' },
                h('span', { className: 'text-sm shrink-0' }, tierIcon[m.tier] || '•'),
                h('div', { className: 'min-w-0' },
                  h('p', { className: 'text-xs font-mono text-slate-200 truncate' }, m.id),
                  h('p', { className: ['text-[11px]', tierColor[m.tier] || 'text-slate-400'].join(' ') }, m.label),
                ),
              ),
              h('div', { className: 'flex items-center gap-1 shrink-0 ml-2' },
                m.id === activeModel && activeProvider === showProvider &&
                  h('span', { className: 'text-[10px] px-1.5 py-0.5 rounded bg-emerald-900/50 text-emerald-400 border border-emerald-700/50' }, 'IN USE'),
                previewModel === m.id &&
                  h('span', { className: 'text-[10px] px-1.5 py-0.5 rounded bg-indigo-700/50 text-indigo-300 border border-indigo-600/50' }, 'SELECTED'),
              ),
            ),
          ),
        ),

        // Custom / free-text model input
        h('div', { className: 'mb-4' },
          h('label', { className: 'block text-[11px] text-slate-400 mb-1.5 font-medium' },
            'Model ID — type any model name (including brand-new ones not in the list above)',
          ),
          h('div', { className: 'flex gap-2' },
            h('input', {
              type: 'text',
              value: customModel,
              onInput: e => setCustomModel(e.target.value),
              placeholder: `e.g. ${showProvider === 'anthropic' ? 'claude-opus-5-beta' : showProvider === 'openai' ? 'gpt-5' : 'gemini-3.0-pro'} — any ID the provider accepts`,
              className: 'flex-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-xs font-mono text-slate-200 placeholder-slate-600 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/30',
            }),
            customModel.trim() && h('button', {
              onClick: () => setCustomModel(''),
              className: 'px-2 py-1 rounded-lg bg-slate-800 border border-slate-700 text-xs text-slate-400 hover:text-white',
            }, '✕'),
          ),
          h('p', { className: 'text-[10px] text-slate-600 mt-1' },
            'DuckPipe passes this string directly to the provider API — no validation. Check the provider\'s model list for the exact ID.',
          ),
        ),

        // Live YAML snippet
        h('div', { className: 'rounded-lg bg-slate-900 border border-slate-700 p-3' },
          h('div', { className: 'flex items-center justify-between mb-2' },
            h('p', { className: 'text-[11px] text-slate-400 font-medium' },
              'Paste into ',
              h('span', { className: 'font-mono' }, 'duckpipe.yaml'),
              ' and restart',
            ),
            h('button', {
              onClick: () => copy(yamlSnippet, 'yaml-snippet'),
              className: 'text-[11px] text-slate-400 hover:text-white px-2 py-0.5 rounded bg-slate-800 border border-slate-700 transition-colors',
            }, copied === 'yaml-snippet' ? '✓ copied!' : 'copy'),
          ),
          h('pre', { className: 'text-[11px] text-slate-300 font-mono leading-relaxed overflow-x-auto' }, yamlSnippet),
        ),

        // API key reminder
        h('p', { className: 'text-[11px] text-slate-500 mt-3' },
          'Needs ',
          h('span', { className: 'text-slate-300 font-mono' }, providerKeys[showProvider] || ''),
          ' in .env · DuckPipe auto-selects the first provider with a valid key · restart after changing model',
        ),
      );
    }

    function SettingsPage() {
      const { data: health } = useApi('health');
      const { data: config } = useApi('config');
      const { data: workflows } = useApi('workflows');

      const integrations = health?.integrations || {};
      const integrationList = ['airflow', 'snowflake', 'dbt', 'slack', 'jira', 'confluence'];

      const tierInfo = {
        1: { name: 'Sandbox', desc: 'Read-only mode — observe your stack, zero risk. No writes to any system.', color: 'green', icon: Eye },
        2: { name: 'Supervised', desc: 'Write actions require Slack approval. Recommended for production.', color: 'yellow', icon: Shield },
        3: { name: 'Autonomous', desc: 'Pre-approved actions execute automatically per policy.yaml rules.', color: 'purple', icon: Zap },
      };
      const currentTier = health?.trust_tier || 1;
      const tier = tierInfo[currentTier];

      return h('div', { className: 'space-y-6 fade-in' },
        h('h2', { className: 'text-lg font-bold' }, 'Settings'),

        // Trust tier
        h(Card, { title: 'Trust Tier', icon: Shield },
          h('div', { className: 'flex items-start gap-4' },
            h('div', { className: `p-3 rounded-xl ${tier.color === 'green' ? 'bg-emerald-500/10' : tier.color === 'yellow' ? 'bg-amber-500/10' : 'bg-purple-500/10'}` },
              h(tier.icon, { size: 28, className: `${tier.color === 'green' ? 'text-emerald-400' : tier.color === 'yellow' ? 'text-amber-400' : 'text-purple-400'}` }),
            ),
            h('div', null,
              h('div', { className: 'flex items-center gap-2 mb-1' },
                h('span', { className: 'text-xl font-bold' }, 'Tier ' + currentTier),
                h(Badge, { label: tier.name, color: tier.color }),
              ),
              h('p', { className: 'text-sm text-slate-400' }, tier.desc),
            ),
          ),
          h('div', { className: 'grid grid-cols-3 gap-3 mt-5' },
            [1, 2, 3].map(t => {
              const ti = tierInfo[t];
              const isActive = t === currentTier;
              return h('div', {
                key: t,
                className: `p-3 rounded-lg border transition-colors ${isActive ? 'border-emerald-500/30 bg-emerald-500/5' : 'border-slate-700/30 bg-slate-900/30 opacity-60'}`
              },
                h('div', { className: 'flex items-center gap-2 mb-1' },
                  h(ti.icon, { size: 14, className: isActive ? 'text-emerald-400' : 'text-slate-500' }),
                  h('span', { className: 'text-xs font-medium' }, 'Tier ' + t + ' — ' + ti.name),
                  isActive && h(Badge, { label: 'Active', color: 'green' }),
                ),
                h('p', { className: 'text-[11px] text-slate-500' }, ti.desc),
              );
            }),
          ),
        ),

        // Integration health
        h(Card, { title: 'Integration Health', icon: Server },
          h('div', { className: 'grid grid-cols-2 gap-3' },
            integrationList.map(name => {
              const st = integrations[name] || 'disabled';
              const iConfig = config?.integrations?.[name] || {};
              const borderCls = st === 'configured' ? 'border-emerald-500/20 bg-emerald-500/5' : st === 'no_credentials' ? 'border-amber-500/20 bg-amber-500/5' : 'border-slate-700/30 bg-slate-900/30';
              const badgeLabel = st === 'configured' ? 'Connected' : st === 'no_credentials' ? 'No Credentials' : 'Disabled';
              const badgeColor = st === 'configured' ? 'green' : st === 'no_credentials' ? 'yellow' : 'slate';
              return h('div', { key: name, className: `p-4 rounded-lg border ${borderCls}` },
                h('div', { className: 'flex items-center justify-between mb-2' },
                  h('div', { className: 'flex items-center gap-2' },
                    h(StatusDot, { status: st === 'configured' ? 'healthy' : st === 'no_credentials' ? 'failed' : false }),
                    h('span', { className: 'text-sm font-medium capitalize' }, name),
                  ),
                  h(Badge, { label: badgeLabel, color: badgeColor }),
                ),
                st !== 'disabled' && h('div', { className: 'text-[11px] text-slate-500 space-y-0.5' },
                  iConfig.base_url && h('p', null, 'URL: ', h('span', { className: 'text-slate-400' }, iConfig.base_url === '\u2022\u2022\u2022\u2022\u2022\u2022' ? 'Configured' : iConfig.base_url)),
                  iConfig.account && h('p', null, 'Account: ', h('span', { className: 'text-slate-400' }, iConfig.account)),
                  iConfig.role && h('p', null, 'Role: ', h('span', { className: 'text-slate-400' }, iConfig.role)),
                  iConfig.warehouse && h('p', null, 'Warehouse: ', h('span', { className: 'text-slate-400' }, iConfig.warehouse)),
                ),
              );
            }),
          ),
        ),

        // Workflows
        h(Card, { title: 'Workflow Configuration', icon: Layers },
          h('div', { className: 'space-y-2' },
            (workflows || []).map(wf =>
              h('div', { key: wf.name, className: 'flex items-center justify-between py-3 border-b border-slate-700/30 last:border-0' },
                h('div', { className: 'flex items-center gap-3' },
                  h(StatusDot, { status: wf.enabled }),
                  h('span', { className: 'text-sm font-medium' }, wf.name),
                ),
                h('div', { className: 'flex items-center gap-3' },
                  h(Badge, { label: wf.enabled ? 'Enabled' : 'Disabled', color: wf.enabled ? 'green' : 'slate' }),
                  h('span', { className: 'text-xs text-slate-500' }, wf.total_runs + ' runs'),
                ),
              )
            ),
          ),
        ),

        // LLM provider + model picker
        h(LlmModelPicker, { health, config }),

        // Raw config
        config && h(Card, { title: 'Configuration (secrets masked)', icon: Terminal },
          h('pre', { className: 'bg-slate-900 rounded-lg p-4 font-mono text-xs text-slate-300 overflow-x-auto max-h-96' },
            JSON.stringify(config, null, 2),
          ),
        ),
      );
    }

    // ── App ───────────────────────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState(window.location.hash.slice(2) || '');
      const [darkMode, setDarkMode] = useState(true);
      const { data: health } = useApi('health');

      useEffect(() => {
        const onHash = () => setPage(window.location.hash.slice(2) || '');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const navigate = useCallback((p) => {
        window.location.hash = p ? '#/' + p : '#/';
        setPage(p);
      }, []);

      const toggleDark = useCallback(() => {
        setDarkMode(d => {
          const next = !d;
          document.documentElement.classList.toggle('dark', next);
          return next;
        });
      }, []);

      const pageComponent = useMemo(() => {
        switch (page) {
          case 'incidents': return h(IncidentsPage);
          case 'costs': return h(CostsPage);
          case 'pipelines': return h(PipelinesPage);
          case 'approvals': return h(ApprovalsPage);
          case 'agents': return h(AgentsPage);
          case 'setup': return h(SetupPage);
          case 'audit': return h(AuditPage);
          case 'settings': return h(SettingsPage);
          default: return h(OverviewPage);
        }
      }, [page]);

      return h('div', { className: 'flex min-h-screen' },
        h(Sidebar, { page, onNav: navigate }),
        h('div', { className: 'flex-1 ml-60' },
          h(TopBar, { darkMode, onToggle: toggleDark, health }),
          h('main', { className: 'p-6 max-w-[1600px]' }, pageComponent),
        ),
      );
    }

    // ── Mount ─────────────────────────────────────────────────────────────
    const root = createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
