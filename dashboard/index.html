<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuckPipe — Observability Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: { brand: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',800:'#065f46',900:'#064e3b' } },
        },
      },
    };
  </script>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
      "lucide-react": "https://esm.sh/lucide-react@0.462.0?external=react"
    }
  }
  </script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #334155 #0f172a; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
    .counter { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    table tbody tr:hover { background-color: rgba(51,65,85,0.4) !important; }
    .chart-container { min-height: 280px; }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect, useCallback, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      AreaChart, Area, BarChart, Bar, LineChart, Line, PieChart, Pie, Cell,
      XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend
    } from 'recharts';
    import {
      Activity, AlertTriangle, BarChart3, CheckCircle2, ChevronRight, Clock,
      CreditCard, Database, Download, ExternalLink, FileText, Filter, Home,
      Layers, Moon, RefreshCw, Search, Server, Settings, Shield, Sun,
      Terminal, XCircle, Zap, TrendingUp, Eye, GitBranch, MessageSquare
    } from 'lucide-react';

    const h = React.createElement;
    const POLL_INTERVAL = 30000;
    const COLORS = { success: '#10b981', warning: '#f59e0b', error: '#ef4444', info: '#3b82f6', muted: '#64748b' };
    const PIE_COLORS = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];

    // ── API fetch helper ──────────────────────────────────────────────────
    const TOKEN = localStorage.getItem('duckpipe_token') || '';
    function authHeaders() {
      const h = {};
      if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
      return h;
    }

    async function api(path) {
      const res = await fetch('/api/' + path, { headers: authHeaders() });
      if (res.status === 401) {
        localStorage.removeItem('duckpipe_token');
        window.location.hash = '#/setup';
        throw new Error('Unauthorized');
      }
      if (!res.ok) throw new Error(`API ${res.status}`);
      return res.json();
    }

    // SSE event bus — replaces polling for real-time updates
    const sseListeners = new Set();
    let sseConnected = false;
    function connectSSE() {
      if (sseConnected) return;
      try {
        const url = TOKEN ? '/api/events?token=' + TOKEN : '/api/events';
        const es = new EventSource(url);
        es.onmessage = (ev) => {
          try {
            const data = JSON.parse(ev.data);
            sseListeners.forEach(fn => fn(data));
          } catch {}
        };
        es.onerror = () => { sseConnected = false; setTimeout(connectSSE, 5000); };
        es.onopen = () => { sseConnected = true; };
      } catch {}
    }
    connectSSE();

    function useSSE(handler) {
      useEffect(() => {
        sseListeners.add(handler);
        return () => sseListeners.delete(handler);
      }, [handler]);
    }

    function useApi(path, deps = []) {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const fetchData = useCallback(async () => {
        try {
          setLoading(true);
          const d = await api(path);
          setData(d);
          setError(null);
        } catch (e) { setError(e.message); }
        finally { setLoading(false); }
      }, [path, ...deps]);
      useEffect(() => { fetchData(); const iv = setInterval(fetchData, POLL_INTERVAL); return () => clearInterval(iv); }, [fetchData]);
      // Refresh on SSE events related to this data
      const sseHandler = useCallback((ev) => {
        if (ev.type === 'workflow_complete' || ev.type === 'audit_entry' || ev.type === 'incident') fetchData();
      }, [fetchData]);
      useSSE(sseHandler);
      return { data, loading, error, refetch: fetchData };
    }

    // ── Formatters ────────────────────────────────────────────────────────
    function fmtTime(iso) { if (!iso) return '—'; try { return new Date(iso + 'Z').toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }); } catch { return iso; } }
    function fmtDate(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString(undefined, { month:'short', day:'numeric' }); } catch { return iso; } }
    function fmtDuration(ms) { if (!ms && ms !== 0) return '—'; if (ms < 1000) return ms + 'ms'; const s = Math.floor(ms/1000); if (s < 60) return s + 's'; const m = Math.floor(s/60); return m + 'm ' + (s%60) + 's'; }
    function fmtNumber(n) { if (n == null) return '—'; return n.toLocaleString(); }

    // ── Shared components ─────────────────────────────────────────────────
    function Badge({ label, color = 'slate' }) {
      const colors = { green: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30', red: 'bg-red-500/20 text-red-400 border-red-500/30', yellow: 'bg-amber-500/20 text-amber-400 border-amber-500/30', blue: 'bg-blue-500/20 text-blue-400 border-blue-500/30', slate: 'bg-slate-500/20 text-slate-400 border-slate-500/30', purple: 'bg-purple-500/20 text-purple-400 border-purple-500/30' };
      return h('span', { className: `inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium border ${colors[color] || colors.slate}` }, label);
    }

    function MetricCard({ icon, label, value, sub, color = 'brand' }) {
      const iconColors = { brand: 'text-emerald-400 bg-emerald-500/10', red: 'text-red-400 bg-red-500/10', amber: 'text-amber-400 bg-amber-500/10', blue: 'text-blue-400 bg-blue-500/10' };
      return h('div', { className: 'bg-slate-800/80 border border-slate-700/50 rounded-xl p-5 fade-in hover:border-slate-600/50 transition-colors' },
        h('div', { className: 'flex items-center gap-3 mb-3' },
          h('div', { className: `p-2 rounded-lg ${iconColors[color] || iconColors.brand}` }, h(icon, { size: 20 })),
          h('span', { className: 'text-sm text-slate-400 font-medium' }, label),
        ),
        h('div', { className: 'text-3xl font-bold tracking-tight counter' }, value ?? '—'),
        sub && h('p', { className: 'text-xs text-slate-500 mt-1' }, sub),
      );
    }

    function Card({ title, icon, children, actions, className = '' }) {
      return h('div', { className: `bg-slate-800/80 border border-slate-700/50 rounded-xl fade-in ${className}` },
        (title || actions) && h('div', { className: 'flex items-center justify-between px-5 py-4 border-b border-slate-700/50' },
          h('div', { className: 'flex items-center gap-2' },
            icon && h(icon, { size: 16, className: 'text-slate-400' }),
            title && h('h3', { className: 'text-sm font-semibold text-slate-200' }, title),
          ),
          actions,
        ),
        h('div', { className: 'p-5' }, children),
      );
    }

    function StatusDot({ status }) {
      const color = status === 'completed' || status === 'healthy' || status === true ? 'bg-emerald-400' : status === 'running' ? 'bg-blue-400 pulse-dot' : status === 'failed' || status === false ? 'bg-red-400' : 'bg-slate-500';
      return h('span', { className: `inline-block w-2 h-2 rounded-full ${color}` });
    }

    function EmptyState({ icon, message }) {
      return h('div', { className: 'flex flex-col items-center justify-center py-12 text-slate-500' },
        h(icon, { size: 40, className: 'mb-3 opacity-40' }),
        h('p', { className: 'text-sm' }, message),
      );
    }

    function Loader() {
      return h('div', { className: 'flex items-center justify-center py-16' },
        h(RefreshCw, { size: 24, className: 'animate-spin text-slate-500' }),
      );
    }

    function DaysToggle({ value, onChange }) {
      return h('div', { className: 'flex gap-1 bg-slate-900/50 rounded-lg p-1' },
        [7, 30, 90].map(d =>
          h('button', {
            key: d,
            onClick: () => onChange(d),
            className: `px-3 py-1 text-xs rounded-md font-medium transition-colors ${value === d ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-slate-200'}`
          }, d + 'd')
        )
      );
    }

    function ChartTooltip({ active, payload, label, formatter }) {
      if (!active || !payload?.length) return null;
      return h('div', { className: 'bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-xs shadow-xl' },
        h('p', { className: 'text-slate-300 mb-1 font-medium' }, formatter ? formatter(label) : label),
        payload.map((p, i) => h('p', { key: i, className: 'flex items-center gap-2' },
          h('span', { className: 'w-2 h-2 rounded-full', style: { background: p.color } }),
          h('span', { className: 'text-slate-400' }, p.name + ': '),
          h('span', { className: 'font-medium text-white' }, typeof p.value === 'number' ? p.value.toLocaleString() : p.value),
        ))
      );
    }

    // ── Navigation ────────────────────────────────────────────────────────
    const NAV_ITEMS = [
      { id: '', label: 'Overview', icon: Home },
      { id: 'incidents', label: 'Incidents', icon: AlertTriangle },
      { id: 'costs', label: 'Cost Monitor', icon: CreditCard },
      { id: 'pipelines', label: 'Pipeline Health', icon: Layers },
      { id: 'approvals', label: 'Approvals', icon: CheckCircle2 },
      { id: 'agents', label: 'Agents', icon: Server },
      { id: 'audit', label: 'Audit Log', icon: Shield },
      { id: 'setup', label: 'Setup', icon: Zap },
      { id: 'settings', label: 'Settings', icon: Settings },
    ];

    function Sidebar({ page, onNav }) {
      return h('aside', { className: 'fixed top-0 left-0 w-60 h-screen bg-slate-900 border-r border-slate-800 flex flex-col z-30' },
        // Logo
        h('div', { className: 'p-5 border-b border-slate-800' },
          h('div', { className: 'flex items-center gap-2.5' },
            h('span', { className: 'text-2xl' }, '\u{1F986}'),
            h('div', null,
              h('h1', { className: 'text-base font-bold text-white tracking-tight' }, 'DuckPipe'),
              h('p', { className: 'text-[10px] text-slate-500 font-medium tracking-wider uppercase' }, 'Observability'),
            ),
          ),
        ),
        // Nav
        h('nav', { className: 'flex-1 p-3 space-y-0.5 overflow-y-auto' },
          NAV_ITEMS.map(item => {
            const active = page === item.id;
            return h('button', {
              key: item.id,
              onClick: () => onNav(item.id),
              className: `w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all ${active ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 border border-transparent'}`
            },
              h(item.icon, { size: 18 }),
              item.label,
            );
          })
        ),
        // Footer
        h('div', { className: 'p-4 border-t border-slate-800' },
          h('a', { href: 'https://duckcode.ai', target: '_blank', className: 'text-[10px] text-slate-600 hover:text-slate-400 flex items-center gap-1' },
            'Built by Duckcode.ai', h(ExternalLink, { size: 10 }),
          ),
        ),
      );
    }

    function TopBar({ darkMode, onToggle, health }) {
      return h('header', { className: 'sticky top-0 z-20 bg-slate-900/80 backdrop-blur-xl border-b border-slate-800/50 px-6 py-3 flex items-center justify-between' },
        h('div', { className: 'flex items-center gap-4' },
          health?.team_name && h('span', { className: 'text-sm text-slate-400' }, health.team_name),
          health?.trust_tier && h(Badge, { label: 'Tier ' + health.trust_tier, color: health.trust_tier === 1 ? 'green' : health.trust_tier === 2 ? 'yellow' : 'purple' }),
          health?.uptime_human && h('span', { className: 'text-xs text-slate-500 flex items-center gap-1' }, h(Clock, { size: 12 }), 'Up ' + health.uptime_human),
        ),
        h('div', { className: 'flex items-center gap-3' },
          h('button', {
            onClick: onToggle,
            className: 'p-2 rounded-lg text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition-colors',
            title: darkMode ? 'Light mode' : 'Dark mode'
          }, h(darkMode ? Sun : Moon, { size: 16 })),
        ),
      );
    }

    // ── Page: Overview ────────────────────────────────────────────────────
    function OverviewPage() {
      const { data: health, loading } = useApi('health');
      const { data: workflows } = useApi('workflows');
      const { data: audit } = useApi('audit?limit=20');

      if (loading && !health) return h(Loader);

      const integrations = health?.integrations || {};
      const integrationList = ['airflow','snowflake','dbt','slack','jira','confluence'];

      return h('div', { className: 'space-y-6 fade-in' },
        // Metric cards
        h('div', { className: 'grid grid-cols-4 gap-4' },
          h(MetricCard, { icon: AlertTriangle, label: 'Incidents Today', value: fmtNumber(health?.incidents_today || 0), color: (health?.incidents_today || 0) > 0 ? 'red' : 'brand' }),
          h(MetricCard, { icon: Activity, label: 'Active Workflows', value: (health?.active_workflows?.length ?? 0).toString(), color: 'blue' }),
          h(MetricCard, { icon: Shield, label: 'Total Audit Actions', value: fmtNumber(health?.total_audit_actions || 0), color: 'brand' }),
          h(MetricCard, { icon: Zap, label: 'Trust Tier', value: 'Tier ' + (health?.trust_tier || 1), sub: health?.trust_tier === 1 ? 'Read-only' : health?.trust_tier === 2 ? 'Supervised' : 'Autonomous', color: 'amber' }),
        ),

        // Integration status
        h(Card, { title: 'Integration Status', icon: Server },
          h('div', { className: 'flex flex-wrap gap-4' },
            integrationList.map(name =>
              h('div', { key: name, className: 'flex items-center gap-2 px-4 py-2.5 bg-slate-900/50 rounded-lg border border-slate-700/30' },
                h(StatusDot, { status: integrations[name] ?? false }),
                h('span', { className: 'text-sm font-medium capitalize' }, name),
                h('span', { className: 'text-xs text-slate-500' }, integrations[name] ? 'Connected' : 'Disabled'),
              )
            ),
          ),
        ),

        // Workflows + Recent alerts
        h('div', { className: 'grid grid-cols-3 gap-4' },
          // Workflow cards
          h('div', { className: 'col-span-2 space-y-4' },
            h(Card, { title: 'Workflow Status', icon: Layers },
              h('div', { className: 'grid grid-cols-2 gap-3' },
                (workflows || []).map(wf =>
                  h('div', { key: wf.name, className: `p-3 rounded-lg border transition-colors ${wf.enabled ? 'bg-slate-900/50 border-slate-700/30 hover:border-slate-600/50' : 'bg-slate-900/30 border-slate-800/30 opacity-60'}` },
                    h('div', { className: 'flex items-center justify-between mb-2' },
                      h('span', { className: 'text-sm font-medium' }, wf.name),
                      h(Badge, { label: wf.enabled ? 'Enabled' : 'Disabled', color: wf.enabled ? 'green' : 'slate' }),
                    ),
                    h('div', { className: 'flex items-center gap-4 text-xs text-slate-500' },
                      h('span', null, fmtNumber(wf.total_runs) + ' runs'),
                      wf.success_count > 0 && h('span', { className: 'text-emerald-400' }, wf.success_count + ' ok'),
                      wf.fail_count > 0 && h('span', { className: 'text-red-400' }, wf.fail_count + ' failed'),
                    ),
                    wf.last_run && h('p', { className: 'text-[11px] text-slate-600 mt-1.5' }, 'Last: ' + fmtTime(wf.last_run.started_at)),
                  )
                ),
              ),
            ),
          ),

          // Recent alerts
          h('div', null,
            h(Card, { title: 'Recent Activity', icon: Activity },
              audit?.entries?.length ? h('div', { className: 'space-y-2 max-h-[400px] overflow-y-auto' },
                audit.entries.map((e, i) =>
                  h('div', { key: e.id || i, className: 'flex items-start gap-3 py-2 border-b border-slate-700/30 last:border-0' },
                    h(StatusDot, { status: e.success ? 'completed' : 'failed' }),
                    h('div', { className: 'flex-1 min-w-0' },
                      h('p', { className: 'text-xs font-medium truncate' }, e.tool),
                      h('p', { className: 'text-[11px] text-slate-500' }, e.agent + ' \u2022 ' + e.workflow),
                    ),
                    h('span', { className: 'text-[10px] text-slate-600 whitespace-nowrap' }, fmtTime(e.created_at)),
                  )
                ),
              ) : h(EmptyState, { icon: Activity, message: 'No activity yet' }),
            ),
          ),
        ),
      );
    }

    // ── Page: Incidents ───────────────────────────────────────────────────
    function IncidentsPage() {
      const [days, setDays] = useState(7);
      const [expanded, setExpanded] = useState(null);
      const { data, loading } = useApi('incidents?days=' + days, [days]);

      if (loading && !data) return h(Loader);

      const incidents = data?.incidents || [];
      const dailyCounts = (data?.daily_counts || []).map(d => ({ ...d, day: fmtDate(d.day) }));

      // Parse incidents for categories
      const categories = {};
      incidents.forEach(inc => {
        const r = inc.parsed_result;
        const cat = r?.rootCauseCategory || r?.root_cause_category || 'unknown';
        categories[cat] = (categories[cat] || 0) + 1;
      });
      const pieData = Object.entries(categories).map(([name, value]) => ({ name, value }));

      const total = incidents.length;
      const p1 = incidents.filter(i => { const r = i.parsed_result; return r?.severity === 'P1'; }).length;
      const resolved = incidents.filter(i => i.status === 'completed').length;

      return h('div', { className: 'space-y-6 fade-in' },
        h('div', { className: 'flex items-center justify-between' },
          h('h2', { className: 'text-lg font-bold' }, 'Incidents'),
          h(DaysToggle, { value: days, onChange: setDays }),
        ),

        // Stats
        h('div', { className: 'grid grid-cols-4 gap-4' },
          h(MetricCard, { icon: AlertTriangle, label: 'Total Incidents', value: fmtNumber(total), color: total > 0 ? 'red' : 'brand' }),
          h(MetricCard, { icon: XCircle, label: 'P1 Critical', value: fmtNumber(p1), color: 'red' }),
          h(MetricCard, { icon: CheckCircle2, label: 'Resolved', value: fmtNumber(resolved), color: 'brand' }),
          h(MetricCard, { icon: Clock, label: 'Period', value: days + ' days', color: 'blue' }),
        ),

        // Charts
        h('div', { className: 'grid grid-cols-3 gap-4' },
          h(Card, { title: 'Incidents Over Time', icon: TrendingUp, className: 'col-span-2' },
            dailyCounts.length > 0 ? h('div', { className: 'chart-container' },
              h(ResponsiveContainer, { width: '100%', height: 280 },
                h(AreaChart, { data: dailyCounts },
                  h('defs', null,
                    h('linearGradient', { id: 'incGrad', x1: '0', y1: '0', x2: '0', y2: '1' },
                      h('stop', { offset: '5%', stopColor: COLORS.error, stopOpacity: 0.3 }),
                      h('stop', { offset: '95%', stopColor: COLORS.error, stopOpacity: 0 }),
                    ),
                  ),
                  h(CartesianGrid, { strokeDasharray: '3 3', stroke: '#1e293b' }),
                  h(XAxis, { dataKey: 'day', stroke: '#475569', tick: { fontSize: 11 } }),
                  h(YAxis, { stroke: '#475569', tick: { fontSize: 11 }, allowDecimals: false }),
                  h(Tooltip, { content: h(ChartTooltip, {}) }),
                  h(Area, { type: 'monotone', dataKey: 'count', name: 'Incidents', stroke: COLORS.error, fill: 'url(#incGrad)', strokeWidth: 2 }),
                ),
              ),
            ) : h(EmptyState, { icon: BarChart3, message: 'No incident data for this period' }),
          ),

          h(Card, { title: 'Root Cause Breakdown', icon: Search },
            pieData.length > 0 ? h(ResponsiveContainer, { width: '100%', height: 280 },
              h(PieChart, null,
                h(Pie, { data: pieData, cx: '50%', cy: '50%', innerRadius: 50, outerRadius: 90, paddingAngle: 3, dataKey: 'value', label: ({ name, percent }) => name + ' ' + (percent * 100).toFixed(0) + '%' },
                  pieData.map((_, i) => h(Cell, { key: i, fill: PIE_COLORS[i % PIE_COLORS.length] })),
                ),
                h(Tooltip, {}),
              ),
            ) : h(EmptyState, { icon: Search, message: 'No category data' }),
          ),
        ),

        // Table
        h(Card, { title: 'Incident Details', icon: FileText },
          incidents.length > 0 ? h('div', { className: 'overflow-x-auto' },
            h('table', { className: 'w-full text-sm' },
              h('thead', null,
                h('tr', { className: 'border-b border-slate-700/50' },
                  ['Time', 'Status', 'DAGs', 'Severity', 'Root Cause', ''].map(col =>
                    h('th', { key: col, className: 'px-3 py-2.5 text-left text-xs font-medium text-slate-500 uppercase tracking-wider' }, col)
                  ),
                ),
              ),
              h('tbody', null,
                incidents.map((inc, idx) => {
                  const r = inc.parsed_result || {};
                  const isExp = expanded === idx;
                  return h(React.Fragment, { key: inc.id || idx },
                    h('tr', {
                      onClick: () => setExpanded(isExp ? null : idx),
                      className: `border-b border-slate-700/30 cursor-pointer transition-colors ${idx % 2 ? 'bg-slate-800/30' : ''}`
                    },
                      h('td', { className: 'px-3 py-2.5 text-xs whitespace-nowrap' }, fmtTime(inc.started_at)),
                      h('td', { className: 'px-3 py-2.5' }, h(Badge, { label: inc.status, color: inc.status === 'completed' ? 'green' : inc.status === 'failed' ? 'red' : 'yellow' })),
                      h('td', { className: 'px-3 py-2.5 text-xs' }, (r.affectedDags || []).join(', ') || '—'),
                      h('td', { className: 'px-3 py-2.5' }, r.severity ? h(Badge, { label: r.severity, color: r.severity === 'P1' ? 'red' : r.severity === 'P2' ? 'yellow' : 'green' }) : '—'),

    // ── Page: Pipeline Health ─────────────────────────────────────────────
    function PipelinesPage() {
      const [days, setDays] = useState(7);
      const { data, loading } = useApi('pipelines?days=' + days, [days]);

      if (loading && !data) return h(Loader);

      const runHistory = data?.run_history || [];
      const schemaChanges = data?.schema_changes || [];
      const slaRuns = data?.sla_runs || [];

      // Build DAG duration chart
      const dagMap = {};
      runHistory.forEach(r => {
        const day = fmtDate(r.recorded_at);
        if (!dagMap[r.dag_id]) dagMap[r.dag_id] = {};
        if (!dagMap[r.dag_id][day]) dagMap[r.dag_id][day] = [];
        dagMap[r.dag_id][day].push(r.duration_seconds);
      });
      const dagIds = Object.keys(dagMap).slice(0, 8);
      const allDays = [...new Set(runHistory.map(r => fmtDate(r.recorded_at)))].sort();
      const trendData = allDays.map(day => {
        const entry = { day };
        dagIds.forEach(id => { entry[id] = dagMap[id]?.[day] ? Math.round(dagMap[id][day].reduce((a,b) => a+b, 0) / dagMap[id][day].length) : null; });
        return entry;
      });

      const totalRuns = runHistory.length;
      const successRuns = runHistory.filter(r => r.status === 'success').length;
      const slaCompliancePct = totalRuns > 0 ? Math.round((successRuns / totalRuns) * 100) : 100;

      // SLA warnings from sla_runs
      const slaWarnings = [];
      slaRuns.forEach(r => {
        try {
          const pr = r.result_json ? JSON.parse(r.result_json) : {};
          if (pr.warnings) slaWarnings.push(...pr.warnings);
        } catch { /* empty */ }
      });

      return h('div', { className: 'space-y-6 fade-in' },
        h('div', { className: 'flex items-center justify-between' },
          h('h2', { className: 'text-lg font-bold' }, 'Pipeline Health'),
          h(DaysToggle, { value: days, onChange: setDays }),
        ),

        h('div', { className: 'grid grid-cols-4 gap-4' },
          h(MetricCard, { icon: Activity, label: 'DAG Runs', value: fmtNumber(totalRuns), color: 'blue' }),
          h(MetricCard, { icon: CheckCircle2, label: 'SLA Compliance', value: slaCompliancePct + '%', color: slaCompliancePct >= 95 ? 'brand' : slaCompliancePct >= 80 ? 'amber' : 'red' }),
          h(MetricCard, { icon: GitBranch, label: 'Schema Changes', value: fmtNumber(schemaChanges.length), color: schemaChanges.length > 0 ? 'amber' : 'brand' }),
          h(MetricCard, { icon: AlertTriangle, label: 'SLA Warnings', value: fmtNumber(slaWarnings.length), color: slaWarnings.length > 0 ? 'red' : 'brand' }),
        ),

        // Duration trend
        h(Card, { title: 'DAG Duration Trends', icon: TrendingUp },
          trendData.length > 0 ? h('div', { className: 'chart-container' },
            h(ResponsiveContainer, { width: '100%', height: 300 },
              h(LineChart, { data: trendData },
                h(CartesianGrid, { strokeDasharray: '3 3', stroke: '#1e293b' }),
                h(XAxis, { dataKey: 'day', stroke: '#475569', tick: { fontSize: 11 } }),
                h(YAxis, { stroke: '#475569', tick: { fontSize: 11 }, label: { value: 'seconds', angle: -90, position: 'insideLeft', style: { fill: '#475569', fontSize: 11 } } }),
                h(Tooltip, { content: h(ChartTooltip, {}) }),
                h(Legend, { wrapperStyle: { fontSize: 11 } }),
                dagIds.map((id, i) =>
                  h(Line, { key: id, type: 'monotone', dataKey: id, name: id, stroke: PIE_COLORS[i % PIE_COLORS.length], strokeWidth: 2, dot: false, connectNulls: true })
                ),
              ),
            ),
          ) : h(EmptyState, { icon: Activity, message: 'No run history data' }),
        ),

        h('div', { className: 'grid grid-cols-2 gap-4' },
          // Schema drift timeline
          h(Card, { title: 'Schema Changes', icon: Database },
            schemaChanges.length > 0 ? h('div', { className: 'space-y-2 max-h-[300px] overflow-y-auto' },
              schemaChanges.map((sc, i) =>
                h('div', { key: i, className: 'flex items-center gap-3 py-2 border-b border-slate-700/30 last:border-0' },
                  h(GitBranch, { size: 14, className: 'text-amber-400 flex-shrink-0' }),
                  h('div', { className: 'flex-1 min-w-0' },
                    h('p', { className: 'text-xs font-medium truncate' }, sc.database_name + '.' + sc.schema_name + '.' + sc.table_name),
                    h('p', { className: 'text-[11px] text-slate-500' }, fmtTime(sc.captured_at)),
                  ),
                )
              ),
            ) : h(EmptyState, { icon: Database, message: 'No schema changes' }),
          ),

          // SLA warnings
          h(Card, { title: 'Active SLA Warnings', icon: AlertTriangle },
            slaWarnings.length > 0 ? h('div', { className: 'space-y-2 max-h-[300px] overflow-y-auto' },
              slaWarnings.map((w, i) =>
                h('div', { key: i, className: 'p-3 rounded-lg bg-amber-500/5 border border-amber-500/20' },
                  h('p', { className: 'text-xs font-medium text-amber-400' }, w.dag_id || w.dag || 'Unknown DAG'),
                  h('p', { className: 'text-[11px] text-slate-400 mt-1' }, w.message || 'SLA breach predicted'),
                  w.probability && h('div', { className: 'mt-2 h-1.5 rounded-full bg-slate-700 overflow-hidden' },
                    h('div', { className: 'h-full rounded-full bg-amber-500', style: { width: (w.probability * 100) + '%' } }),
                  ),
                )
              ),
            ) : h(EmptyState, { icon: CheckCircle2, message: 'All DAGs within SLA' }),
          ),
        ),
      );
    }

                  h('th', { className: 'pb-2 font-medium' }, 'Time'),
                  h('th', { className: 'pb-2 font-medium' }, 'Workflow'),
                  h('th', { className: 'pb-2 font-medium' }, 'Agent'),
                  h('th', { className: 'pb-2 font-medium' }, 'Action'),
                  h('th', { className: 'pb-2 font-medium' }, 'Approved By'),
                  h('th', { className: 'pb-2 font-medium' }, 'Status'),
                )),
                h('tbody', null, completed.slice(0, 50).map((a, i) =>
                  h('tr', { key: i, className: 'border-b border-slate-800/50' },
                    h('td', { className: 'py-2 text-slate-400 font-mono text-xs' }, fmtTime(a.created_at)),
                    h('td', { className: 'py-2' }, h(Badge, { label: a.workflow, color: 'slate' })),
                    h('td', { className: 'py-2' }, h(Badge, { label: a.agent, color: 'blue' })),
                    h('td', { className: 'py-2 font-mono text-xs' }, a.tool),
                    h('td', { className: 'py-2 text-xs' }, a.approved_by || '—'),
                    h('td', { className: 'py-2' },
                      a.success ? h(Badge, { label: 'Approved', color: 'green' }) : h(Badge, { label: 'Rejected', color: 'red' }),
                    ),
                  ),
                )),
              ),
        ),
      );
    }

    // ── Agents Page ──────────────────────────────────────────────────
    function AgentsPage() {
      const { data, loading, refetch } = useApi('agents');
      const { data: health } = useApi('health');
      if (loading && !data) return h(Loader);

      const agents = data || [];
      const agentDescriptions = {
        airflow: { desc: 'Monitors DAG runs, detects failures, identifies root causes from task logs.', tier1: 'Read DAG state, task logs', tier2: '+ Trigger DAG retries', tier3: '+ Auto-retry per policy' },
        snowflake: { desc: 'Monitors query performance, credit consumption, and kills runaway queries.', tier1: 'Read query history', tier2: '+ Cancel queries (with approval)', tier3: '+ Auto-cancel per policy' },
        dbt: { desc: 'Detects schema drift, proposes model fixes, opens pull requests.', tier1: 'Read jobs, manifests', tier2: '+ Create branches and PRs', tier3: '+ Auto-PR per policy' },
        comms: { desc: 'Posts Slack alerts, creates Jira tickets, updates Confluence docs.', tier1: 'Read channels', tier2: '+ Post messages (with approval)', tier3: '+ Auto-post per policy' },
      };

      return h('div', { className: 'space-y-6 fade-in' },
        h('div', { className: 'flex items-center justify-between' },
          h('h2', { className: 'text-lg font-bold' }, 'Agent Status'),
          h('button', { onClick: refetch, className: 'text-xs text-slate-400 hover:text-white flex items-center gap-1 px-3 py-1.5 rounded-lg bg-slate-800 border border-slate-700' },
            h(RefreshCw, { size: 12 }), 'Refresh'),
        ),
        h('div', { className: 'grid grid-cols-2 gap-4' },
          agents.map(a => {
            const info = agentDescriptions[a.name] || {};
            const tier = health?.trust_tier || 1;
            return h('div', { key: a.name, className: `p-5 rounded-xl border ${a.running ? 'border-emerald-500/20 bg-emerald-500/5' : 'border-red-500/20 bg-red-500/5'}` },
              h('div', { className: 'flex items-center justify-between mb-3' },
                h('div', { className: 'flex items-center gap-3' },
                  h('div', { className: `p-2 rounded-lg ${a.running ? 'bg-emerald-500/10' : 'bg-red-500/10'}` },
                    h(Server, { size: 20, className: a.running ? 'text-emerald-400' : 'text-red-400' }),
                  ),
                  h('div', null,
                    h('span', { className: 'text-base font-semibold capitalize' }, a.name),
                    h('p', { className: 'text-[11px] text-slate-500' }, info.desc || ''),
                  ),
                ),
                h(StatusDot, { status: a.running }),
              ),
              h('div', { className: 'space-y-1 mt-3' },
                h('div', { className: 'flex items-center gap-2' },
                  h(Badge, { label: 'Tier 1', color: 'green' }),
                  h('span', { className: 'text-xs text-slate-400' }, info.tier1 || ''),
                ),
                tier >= 2 && h('div', { className: 'flex items-center gap-2' },
                  h(Badge, { label: 'Tier 2', color: 'yellow' }),
                  h('span', { className: 'text-xs text-slate-400' }, info.tier2 || ''),
                ),
                tier >= 3 && h('div', { className: 'flex items-center gap-2' },
                  h(Badge, { label: 'Tier 3', color: 'purple' }),
                  h('span', { className: 'text-xs text-slate-400' }, info.tier3 || ''),
                ),
              ),
            );
          }),
        ),
      );
    }

    // ── Setup Wizard Page ────────────────────────────────────────────
    function SetupPage() {
      const { data: health } = useApi('health');
      const [step, setStep] = useState(0);
      const [token, setToken] = useState(localStorage.getItem('duckpipe_token') || '');
      const [verifyResult, setVerifyResult] = useState(null);
      const [verifying, setVerifying] = useState(false);

      const integrations = health?.integrations || {};
      const connectedCount = Object.values(integrations).filter(Boolean).length;
      const totalCount = Object.keys(integrations).length;

      const steps = [
        { label: 'Dashboard Token', desc: 'Secure your dashboard with a bearer token' },
        { label: 'Verify Connections', desc: 'Test all configured integration connections' },
        { label: 'Review Status', desc: 'Confirm everything is working' },
      ];

      const saveToken = () => {
        if (token.trim()) {
          localStorage.setItem('duckpipe_token', token.trim());
          window.location.reload();
        }
      };

      const runVerify = async () => {
        setVerifying(true);
        try {
          const result = await api('health');
          setVerifyResult(result);
        } catch (e) {
          setVerifyResult({ error: e.message });
        }
        setVerifying(false);
      };

      const clearToken = () => {
        localStorage.removeItem('duckpipe_token');
        window.location.reload();
      };

      return h('div', { className: 'space-y-6 fade-in max-w-3xl' },
        h('h2', { className: 'text-lg font-bold' }, 'Setup Wizard'),
        h('p', { className: 'text-sm text-slate-400' }, 'Configure and verify your DuckPipe installation'),

        // Progress
        h('div', { className: 'flex items-center gap-2 mb-6' },
          steps.map((s, i) => h('button', {
            key: i, onClick: () => setStep(i),
            className: `flex-1 p-3 rounded-lg border text-left transition-all ${i === step ? 'border-emerald-500/30 bg-emerald-500/5' : i < step ? 'border-emerald-500/10 bg-slate-800' : 'border-slate-700/30 bg-slate-900/30'}`
          },
            h('div', { className: 'flex items-center gap-2 mb-1' },
              h('span', { className: `w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${i <= step ? 'bg-emerald-500 text-white' : 'bg-slate-700 text-slate-400'}` }, i + 1),
              h('span', { className: 'text-sm font-medium' }, s.label),
            ),
            h('p', { className: 'text-[11px] text-slate-500 ml-8' }, s.desc),
          )),
        ),

        // Step content
        step === 0 && h(Card, { title: 'Dashboard Token', icon: Shield },
          h('p', { className: 'text-sm text-slate-400 mb-4' },
            'Set DUCKPIPE_DASHBOARD_TOKEN in your .env file, then enter it here. Without a token, the dashboard only binds to localhost.'
          ),
          h('div', { className: 'flex gap-2' },
            h('input', {
              type: 'password', value: token,
              onChange: (e) => setToken(e.target.value),
              placeholder: 'Enter your dashboard token',
              className: 'flex-1 px-3 py-2 rounded-lg bg-slate-900 border border-slate-700 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500'
            }),
            h('button', { onClick: saveToken, className: 'px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500' }, 'Save'),
            TOKEN && h('button', { onClick: clearToken, className: 'px-4 py-2 rounded-lg bg-red-600/20 text-red-400 text-sm hover:bg-red-600/30' }, 'Clear'),
          ),
          TOKEN && h('p', { className: 'text-xs text-emerald-400 mt-2' }, 'Token is saved in your browser.'),
          h('button', { onClick: () => setStep(1), className: 'mt-4 px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-sm hover:bg-slate-700' }, 'Next →'),
        ),

        step === 1 && h(Card, { title: 'Verify Connections', icon: Activity },
          h('p', { className: 'text-sm text-slate-400 mb-4' },
            'Test your integration connections. This calls duckpipe verify to check what is configured and accessible.'
          ),
          h('button', { onClick: runVerify, disabled: verifying, className: 'px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500 disabled:opacity-50 mb-4' },
            verifying ? 'Verifying...' : 'Run Verify'
          ),
          verifyResult && h('div', { className: 'mt-3 p-4 rounded-lg bg-slate-900 border border-slate-700 font-mono text-xs space-y-1' },
            verifyResult.error
              ? h('p', { className: 'text-red-400' }, 'Error: ' + verifyResult.error)
              : h('div', null,
                  h('p', { className: 'text-emerald-400' }, '✓ Connected — Tier ' + verifyResult.trust_tier),
                  h('p', { className: 'text-slate-400' }, 'Team: ' + verifyResult.team_name),
                  h('p', { className: 'text-slate-400' }, 'Uptime: ' + verifyResult.uptime_human),
                  h('p', { className: 'text-slate-400' }, 'Integrations:'),
                  Object.entries(verifyResult.integrations || {}).map(([k, v]) =>
                    h('p', { key: k, className: v ? 'text-emerald-400' : 'text-slate-500' },
                      (v ? '  ✓ ' : '  ✗ ') + k
                    )
                  ),
                ),
          ),
          h('div', { className: 'flex gap-2 mt-4' },
            h('button', { onClick: () => setStep(0), className: 'px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-sm hover:bg-slate-700' }, '← Back'),
            h('button', { onClick: () => setStep(2), className: 'px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-sm hover:bg-slate-700' }, 'Next →'),
          ),
        ),

        step === 2 && h(Card, { title: 'Status Summary', icon: CheckCircle2 },
          h('div', { className: 'grid grid-cols-2 gap-4' },
            h('div', { className: 'p-4 rounded-lg bg-slate-900 border border-slate-700' },
              h('p', { className: 'text-sm font-medium mb-2' }, 'Integrations'),
              h('p', { className: 'text-2xl font-bold text-emerald-400' }, connectedCount + '/' + totalCount),
              h('p', { className: 'text-xs text-slate-500' }, 'connected'),
            ),
            h('div', { className: 'p-4 rounded-lg bg-slate-900 border border-slate-700' },
              h('p', { className: 'text-sm font-medium mb-2' }, 'Trust Tier'),
              h('p', { className: 'text-2xl font-bold' }, health?.trust_tier || '—'),
              h('p', { className: 'text-xs text-slate-500' }, health?.trust_tier === 1 ? 'Read-only' : health?.trust_tier === 2 ? 'Supervised' : 'Autonomous'),
            ),
          ),
          h('div', { className: 'mt-4 p-4 rounded-lg bg-emerald-500/5 border border-emerald-500/20' },
            h('p', { className: 'text-sm text-emerald-400 font-medium' }, '🦆 DuckPipe is configured!'),
            h('p', { className: 'text-xs text-slate-400 mt-1' }, 'Edit duckpipe.yaml and .env to adjust settings, then restart DuckPipe.'),
          ),
          h('button', { onClick: () => setStep(0), className: 'mt-4 px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 text-sm hover:bg-slate-700' }, '← Back'),
        ),
      );
    }

    function SettingsPage() {
      const { data: health } = useApi('health');
      const { data: config } = useApi('config');
      const { data: workflows } = useApi('workflows');

      const integrations = health?.integrations || {};
      const integrationList = ['airflow', 'snowflake', 'dbt', 'slack', 'jira', 'confluence'];

      const tierInfo = {
        1: { name: 'Sandbox', desc: 'Read-only mode — observe your stack, zero risk. No writes to any system.', color: 'green', icon: Eye },
        2: { name: 'Supervised', desc: 'Write actions require Slack approval. Recommended for production.', color: 'yellow', icon: Shield },
        3: { name: 'Autonomous', desc: 'Pre-approved actions execute automatically per policy.yaml rules.', color: 'purple', icon: Zap },
      };
      const currentTier = health?.trust_tier || 1;
      const tier = tierInfo[currentTier];

      return h('div', { className: 'space-y-6 fade-in' },
        h('h2', { className: 'text-lg font-bold' }, 'Settings'),

        // Trust tier
        h(Card, { title: 'Trust Tier', icon: Shield },
          h('div', { className: 'flex items-start gap-4' },
            h('div', { className: `p-3 rounded-xl ${tier.color === 'green' ? 'bg-emerald-500/10' : tier.color === 'yellow' ? 'bg-amber-500/10' : 'bg-purple-500/10'}` },
              h(tier.icon, { size: 28, className: `${tier.color === 'green' ? 'text-emerald-400' : tier.color === 'yellow' ? 'text-amber-400' : 'text-purple-400'}` }),
            ),
            h('div', null,
              h('div', { className: 'flex items-center gap-2 mb-1' },
                h('span', { className: 'text-xl font-bold' }, 'Tier ' + currentTier),
                h(Badge, { label: tier.name, color: tier.color }),
              ),
              h('p', { className: 'text-sm text-slate-400' }, tier.desc),
            ),
          ),
          h('div', { className: 'grid grid-cols-3 gap-3 mt-5' },
            [1, 2, 3].map(t => {
              const ti = tierInfo[t];
              const isActive = t === currentTier;
              return h('div', {
                key: t,
                className: `p-3 rounded-lg border transition-colors ${isActive ? 'border-emerald-500/30 bg-emerald-500/5' : 'border-slate-700/30 bg-slate-900/30 opacity-60'}`
              },
                h('div', { className: 'flex items-center gap-2 mb-1' },
                  h(ti.icon, { size: 14, className: isActive ? 'text-emerald-400' : 'text-slate-500' }),
                  h('span', { className: 'text-xs font-medium' }, 'Tier ' + t + ' — ' + ti.name),
                  isActive && h(Badge, { label: 'Active', color: 'green' }),
                ),
                h('p', { className: 'text-[11px] text-slate-500' }, ti.desc),
              );
            }),
          ),
        ),

        // Integration health
        h(Card, { title: 'Integration Health', icon: Server },
          h('div', { className: 'grid grid-cols-2 gap-3' },
            integrationList.map(name => {
              const enabled = integrations[name];
              const iConfig = config?.integrations?.[name] || {};
              return h('div', { key: name, className: `p-4 rounded-lg border ${enabled ? 'border-emerald-500/20 bg-emerald-500/5' : 'border-slate-700/30 bg-slate-900/30'}` },
                h('div', { className: 'flex items-center justify-between mb-2' },
                  h('div', { className: 'flex items-center gap-2' },
                    h(StatusDot, { status: enabled }),
                    h('span', { className: 'text-sm font-medium capitalize' }, name),
                  ),
                  h(Badge, { label: enabled ? 'Connected' : 'Disabled', color: enabled ? 'green' : 'slate' }),
                ),
                enabled && h('div', { className: 'text-[11px] text-slate-500 space-y-0.5' },
                  iConfig.base_url && h('p', null, 'URL: ', h('span', { className: 'text-slate-400' }, iConfig.base_url === '\u2022\u2022\u2022\u2022\u2022\u2022' ? 'Configured' : iConfig.base_url)),
                  iConfig.account && h('p', null, 'Account: ', h('span', { className: 'text-slate-400' }, iConfig.account)),
                  iConfig.role && h('p', null, 'Role: ', h('span', { className: 'text-slate-400' }, iConfig.role)),
                  iConfig.warehouse && h('p', null, 'Warehouse: ', h('span', { className: 'text-slate-400' }, iConfig.warehouse)),
                ),
              );
            }),
          ),
        ),

        // Workflows
        h(Card, { title: 'Workflow Configuration', icon: Layers },
          h('div', { className: 'space-y-2' },
            (workflows || []).map(wf =>
              h('div', { key: wf.name, className: 'flex items-center justify-between py-3 border-b border-slate-700/30 last:border-0' },
                h('div', { className: 'flex items-center gap-3' },
                  h(StatusDot, { status: wf.enabled }),
                  h('span', { className: 'text-sm font-medium' }, wf.name),
                ),
                h('div', { className: 'flex items-center gap-3' },
                  h(Badge, { label: wf.enabled ? 'Enabled' : 'Disabled', color: wf.enabled ? 'green' : 'slate' }),
                  h('span', { className: 'text-xs text-slate-500' }, wf.total_runs + ' runs'),
                ),
              )
            ),
          ),
        ),

        // Raw config
        config && h(Card, { title: 'Configuration (secrets masked)', icon: Terminal },
          h('pre', { className: 'bg-slate-900 rounded-lg p-4 font-mono text-xs text-slate-300 overflow-x-auto max-h-96' },
            JSON.stringify(config, null, 2),
          ),
        ),
      );
    }

    // ── App ───────────────────────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState(window.location.hash.slice(2) || '');
      const [darkMode, setDarkMode] = useState(true);
      const { data: health } = useApi('health');

      useEffect(() => {
        const onHash = () => setPage(window.location.hash.slice(2) || '');
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const navigate = useCallback((p) => {
        window.location.hash = p ? '#/' + p : '#/';
        setPage(p);
      }, []);

      const toggleDark = useCallback(() => {
        setDarkMode(d => {
          const next = !d;
          document.documentElement.classList.toggle('dark', next);
          return next;
        });
      }, []);

      const pageComponent = useMemo(() => {
        switch (page) {
          case 'incidents': return h(IncidentsPage);
          case 'costs': return h(CostsPage);
          case 'pipelines': return h(PipelinesPage);
          case 'approvals': return h(ApprovalsPage);
          case 'agents': return h(AgentsPage);
          case 'setup': return h(SetupPage);
          case 'audit': return h(AuditPage);
          case 'settings': return h(SettingsPage);
          default: return h(OverviewPage);
        }
      }, [page]);

      return h('div', { className: 'flex min-h-screen' },
        h(Sidebar, { page, onNav: navigate }),
        h('div', { className: 'flex-1 ml-60' },
          h(TopBar, { darkMode, onToggle: toggleDark, health }),
          h('main', { className: 'p-6 max-w-[1600px]' }, pageComponent),
        ),
      );
    }

    // ── Mount ─────────────────────────────────────────────────────────────
    const root = createRoot(document.getElementById('root'));
    root.render(h(App));
  </script>
</body>
</html>
